<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teacher Dashboard - Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{font-family:'Cairo',sans-serif}
body{background:#020617;color:#e2e8f0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#5b21b6;border-radius:3px}
.msg{animation:fade.2s} @keyframes fade{from{opacity:0;transform:translateY(5px)}}
</style>
</head>
<body class="h-screen flex flex-col">
<header class="h-[64px] bg-[#0f172a] border-b border-violet-900/30 px-5 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-600 to-indigo-600 grid place-items-center font-bold">ع</div>
    <span class="font-bold">لوحة الأستاذ عبدالحميد</span>
  </div>
  <div id="clock" class="font-mono text-violet-300 text-sm"></div>
</header>

<div class="flex-1 flex overflow-hidden">
  <aside class="w-[340px] bg-[#0f172a] border-l border-violet-900/20 flex flex-col">
    <div class="p-3"><input id="search" class="w-full h-10 rounded-lg bg-[#020617] border border-white/10 px-3 text-sm outline-none" placeholder="بحث..."></div>
    <div id="students" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
  </aside>

  <main class="flex-1 flex flex-col">
    <div id="chatHead" class="hidden h-[56px] bg-[#0f172a] border-b border-violet-900/20 px-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div id="avatar" class="w-9 h-9 rounded-lg bg-violet-600 grid place-items-center font-bold"></div>
        <div><div id="sName" class="font-semibold"></div><div id="sStatus" class="text-xs text-gray-400"></div></div>
      </div>
      <button id="clearChat" class="text-xs px-3 py-1.5 rounded-lg bg-red-900/40 text-red-300 hover:bg-red-900/60">مسح الكل</button>
    </div>
    <div id="messages" class="flex-1 overflow-y-auto p-4 bg-[#020617]"></div>
    <form id="form" class="hidden p-3 bg-[#0f172a] border-t border-violet-900/20 flex gap-2">
      <textarea id="input" rows="1" class="flex-1 bg-[#020617] border border-white/10 rounded-xl px-3 py-2.5 resize-none outline-none max-h-32" placeholder="Enter للإرسال"></textarea>
      <button class="px-5 bg-violet-600 rounded-xl font-bold disabled:opacity-30" id="sendBtn" disabled>إرسال</button>
    </form>
  </main>
</div>

<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supa=createClient('https://igedjuwdwyoydiyhsfyb.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZWRqdXdkd3lveWRpeWhzZnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTM0OTIsImV4cCI6MjA5MzQyOTQ5Mn0.8otVjvVT5NWx6whBvA_15ke48p6N9fUWMQE7MTnCrYg');
const TEACHER='teacher_abdulhamid';
let activeStudent=null, studentsMap={}, presence={};

// 1. CLOCK
setInterval(()=>clock.textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}),1000);

// 2. HEARTBEAT - حل مشكلة الأونلاين
async function heartbeat(){ await supa.from('user_presence').upsert({user_id:TEACHER, is_online:true, last_seen:new Date().toISOString()},{onConflict:'user_id'}) }
setInterval(heartbeat,8000); heartbeat();

// 3. LOAD STUDENTS + PRESENCE
async function loadAll(){
  const [{data:p},{data:m}] = await Promise.all([
    supa.from('user_presence').select('*'),
    supa.from('messages').select('*').ilike('channel',`%${TEACHER}%`).order('created_at',{ascending:false}).limit(1000)
  ]);
  presence=Object.fromEntries((p||[]).map(x=>[x.user_id,x]));
  const map={}; (m||[]).forEach(msg=>{ if(!map[msg.channel]){ const sid=msg.channel.split(':').find(s=>s.startsWith('student_')); if(sid) map[msg.channel]={id:sid,name:sid.replace('student_',''),last:msg.text,time:msg.created_at,ch:msg.channel} } });
  studentsMap=Object.fromEntries(Object.values(map).map(s=>[s.id,s])); renderStudents();
}
function renderStudents(){
  students.innerHTML=''; Object.values(studentsMap).sort((a,b)=>new Date(b.time)-new Date(a.time)).filter(s=>!search.value||s.name.includes(search.value)).forEach(s=>{
    const on=presence[s.id]?.is_online && (Date.now()-new Date(presence[s.id].last_seen)<15000);
    const el=document.createElement('button'); el.className='w-full text-right p-2.5 rounded-lg hover:bg-white/5 flex items-center gap-2.5 '+(activeStudent===s.id?'bg-white/10':'');
    el.innerHTML=`<div class="relative"><div class="w-10 h-10 rounded-lg bg-violet-700 grid place-items-center">${s.name[0]}</div><span class="absolute -bottom-0.5 -left-0.5 w-2.5 h-2.5 ${on?'bg-emerald-500':'bg-gray-600'} rounded-full border-2 border-[#0f172a]"></span></div><div class="flex-1 min-w-0"><div class="truncate font-medium">${s.name}</div><div class="text-xs text-gray-500 truncate">${s.last||''}</div></div>`;
    el.onclick=()=>openChat(s.id); students.appendChild(el);
  });
}

// 4. OPEN CHAT
async function openChat(id){
  activeStudent=id; chatHead.classList.remove('hidden'); form.classList.remove('hidden');
  sName.textContent=studentsMap[id].name; avatar.textContent=studentsMap[id].name[0]; updateStatus();
  await loadMessages(); input.focus();
}
function updateStatus(){ const p=presence[activeStudent]; const on=p?.is_online && (Date.now()-new Date(p.last_seen)<15000); sStatus.textContent=on?'Online now':'Last seen '+new Date(p?.last_seen||0).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }

// 5. MESSAGES - حل مشكلة الظهور الفوري
async function loadMessages(){
  const {data}=await supa.from('messages').select('*').eq('channel',`chat:${[TEACHER,activeStudent].sort().join(':')}`).order('created_at');
  messages.innerHTML=''; (data||[]).forEach(renderMsg); messages.scrollTop=messages.scrollHeight;
  // علم كمقروء
  await supa.from('messages').update({status:'read',read_at:new Date().toISOString()}).eq('channel',`chat:${[TEACHER,activeStudent].sort().join(':')}`).neq('from_id',TEACHER);
}
function renderMsg(m){
  const me=m.from_id===TEACHER; const div=document.createElement('div'); div.className='msg flex mb-2 '+(me?'justify-end':'justify-start')+' group'; div.dataset.id=m.id;
  const tick=me?(m.status==='read'?'<span class="text-sky-400">✓✓</span>':m.status==='delivered'?'<span class="text-gray-400">✓✓</span>':'<span class="text-gray-500">✓</span>'):'';
  div.innerHTML=`<div class="relative max-w-[70%]"><div class="${me?'bg-violet-600':'bg-[#1e293b]'} px-3.5 py-2 rounded-2xl text-[14px]">${m.text.replace(/</g,'&lt;')}</div><div class="text-[10px] text-gray-500 mt-1 flex gap-1 ${me?'justify-end':'justify-start'}">${new Date(m.created_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})} ${tick}</div><button class="absolute ${me?'-left-8':'-right-8'} top-1 opacity-0 group-hover:opacity-100 w-6 h-6 grid place-items-center bg-red-900/80 rounded-lg" onclick="window.delOne('${m.id}')">✕</button></div>`;
  messages.appendChild(div);
}
window.delOne=async(id)=>{ if(confirm('حذف الرسالة؟')) await supa.from('messages').delete().eq('id',id) };

// 6. SEND - Optimistic UI
form.onsubmit=async e=>{e.preventDefault(); const txt=input.value.trim(); if(!txt||!activeStudent) return; input.value=''; sendBtn.disabled=true;
  const temp={id:'tmp',from_id:TEACHER,text:txt,created_at:new Date().toISOString(),status:'sent'}; renderMsg(temp); messages.scrollTop=messages.scrollHeight;
  const {data}=await supa.from('messages').insert({channel:`chat:${[TEACHER,activeStudent].sort().join(':')}`,from_id:TEACHER,text:txt,status:'sent'}).select().single();
  document.querySelector('[data-id="tmp"]')?.remove(); if(data) renderMsg(data); sendBtn.disabled=false;
};
input.oninput=()=>sendBtn.disabled=!input.value.trim();
input.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();form.requestSubmit()}};

// 7. DELETE ALL
clearChat.onclick=async()=>{ if(!activeStudent||!confirm('مسح المحادثة بالكامل؟')) return; await supa.from('messages').delete().eq('channel',`chat:${[TEACHER,activeStudent].sort().join(':')}`); messages.innerHTML=''; };

// 8. REALTIME - حل كل مشاكل التحديث
supa.channel('rt')
.on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},p=>{
  const m=p.new; if(!m.channel.includes(TEACHER))return; const sid=m.channel.split(':').find(x=>x.startsWith('student_')); if(studentsMap[sid]){studentsMap[sid].last=m.text;studentsMap[sid].time=m.created_at;renderStudents();}
  if(sid===activeStudent){ renderMsg(m); messages.scrollTop=messages.scrollHeight; if(m.from_id!==TEACHER) supa.from('messages').update({status:'delivered'}).eq('id',m.id); }
})
.on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},p=>{ if(p.new.channel.includes(activeStudent)) loadMessages() })
.on('postgres_changes',{event:'DELETE',schema:'public',table:'messages'},p=>{ document.querySelector(`[data-id="${p.old.id}"]`)?.remove() })
.on('postgres_changes',{event:'*',schema:'public',table:'user_presence'},()=>loadAll())
.subscribe();

loadAll(); search.oninput=renderStudents;
</script>
</body>
</html>
