<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم الأستاذ عبدالحميد - Dark Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
  <style>
    * { font-family: 'Cairo', sans-serif; }
    body{background:#020617;color:#e2e8f0}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:#4c1d95;border-radius:3px}
   .message-enter{animation:slideIn.25s ease-out}
    @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body class="h-screen overflow-hidden">
<header class="h-[68px] bg-[#0f172a] border-b border-violet-900/20 fixed top-0 inset-x-0 z-40">
  <div class="h-full px-5 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-violet-600 to-purple-600 grid place-items-center text-white font-bold">ع</div>
      <div>
        <h1 class="font-bold text-white">لوحة تحكم الأستاذ عبدالحميد</h1>
        <div class="flex items-center gap-1.5"><span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span><span class="text-xs text-emerald-400">متصل الآن</span></div>
      </div>
    </div>
    <div id="current-time" class="text-violet-300 bg-[#020617] px-3 py-1.5 rounded-xl border border-violet-900/30 text-sm font-mono"></div>
  </div>
</header>

<main class="pt-[68px] h-screen flex">
<aside id="sidebar" class="w-full lg:w-[360px] bg-[#0f172a] border-l border-violet-900/20 flex flex-col h-[calc(100vh-68px)]">
  <div class="p-4 border-b border-white/5">
    <input id="search" placeholder="ابحث عن طالب..." class="w-full h-11 bg-[#020617] border border-white/10 rounded-2xl px-4 text-sm outline-none focus:ring-2 focus:ring-violet-500/30 text-gray-200">
  </div>
  <div class="flex-1 overflow-y-auto p-2">
    <div id="students-list" class="space-y-1"></div>
  </div>
</aside>

<section id="chat-area" class="flex-1 hidden lg:flex flex-col bg-[#020617] h-[calc(100vh-68px)]">
  <div id="empty-state" class="flex-1 grid place-items-center">
    <div class="text-center"><div class="w-24 h-24 mx-auto mb-4 rounded-3xl bg-violet-900/30 grid place-items-center"><svg class="w-12 h-12 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg></div><h3 class="text-xl font-bold text-white mb-1">مرحباً أستاذ عبدالحميد</h3><p class="text-gray-500">اختر طالب من القائمة</p></div>
  </div>

  <div id="chat-header" class="hidden bg-[#0f172a] border-b border-violet-900/20 px-4 py-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="back-btn" class="lg:hidden p-2 hover:bg-white/5 rounded-xl"><svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
        <div class="relative"><div id="chat-avatar" class="w-11 h-11 rounded-2xl bg-violet-600 grid place-items-center text-white font-bold">س</div><span id="online-dot" class="absolute -bottom-0.5 -left-0.5 w-3 h-3 bg-gray-600 border-2 border-[#0f172a] rounded-full"></span></div>
        <div><h2 id="chat-student-name" class="font-bold text-white"></h2><p id="chat-student-id" class="text-xs text-gray-400"></p></div>
      </div>
      <button id="delete-chat" class="p-2.5 hover:bg-red-950/50 rounded-xl" title="مسح"><svg class="w-5 h-5 text-gray-500 hover:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
    </div>
  </div>

  <div id="messages-container" class="hidden flex-1 overflow-y-auto px-4 py-5"><div id="messages-list" class="space-y-3 max-w-4xl mx-auto"></div></div>

  <div id="input-wrap" class="hidden bg-[#0f172a] border-t border-violet-900/20 p-3">
    <form id="message-form" class="max-w-4xl mx-auto flex gap-2">
      <textarea id="message-input" rows="1" placeholder="اكتب رسالتك... Enter للإرسال" class="flex-1 resize-none bg-[#020617] border border-white/10 rounded-2xl px-4 py-3 text-[15px] outline-none focus:ring-2 focus:ring-violet-500/30 text-gray-100 max-h-32"></textarea>
      <button id="send-btn" type="submit" disabled class="px-5 bg-violet-600 hover:bg-violet-700 disabled:bg-gray-700 text-white rounded-2xl font-bold">إرسال</button>
    </form>
  </div>
</section>
</main>

<script>
const supa = window.supabase.createClient('https://igedjuwdwyoydiyhsfyb.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZWRqdXdkd3lveWRpeWhzZnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTM0OTIsImV4cCI6MjA5MzQyOTQ5Mn0.8otVjvVT5NWx6whBvA_15ke48p6N9fUWMQE7MTnCrYg');
const T='teacher_abdulhamid'; let students={}, active=null, presence={};

const list=document.getElementById('students-list'), msgs=document.getElementById('messages-list'), inp=document.getElementById('message-input'), sendBtn=document.getElementById('send-btn');

function tick(){ document.getElementById('current-time').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}); }
tick(); setInterval(tick,1000);

const ch=s=>`chat:${[T,s].sort().join(':')}`;
const esc=s=>s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const fmt=t=>new Date(t).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});

async function load(){
  const {data:p}=await supa.from('user_presence').select('*'); presence={}; (p||[]).forEach(x=>presence[x.user_id]=x);
  const {data:m}=await supa.from('messages').select('*').ilike('channel',`%${T}%`).order('created_at',{ascending:false}).limit(800);
  const map={}; (m||[]).forEach(msg=>{if(!map[msg.channel]){const sid=msg.channel.split(':').find(x=>x!==T&&x.startsWith('student_')); if(sid) map[msg.channel]={id:sid,name:sid.replace('student_',''),channel:msg.channel,last:msg.text||'',time:msg.created_at};}});
  students=Object.values(map).reduce((a,s)=>(a[s.id]=s,a),{}); render();
  if(!active&&Object.keys(students)[0]) open(Object.keys(students)[0]);
}
function render(f=''){
  list.innerHTML=''; Object.values(students).sort((a,b)=>new Date(b.time)-new Date(a.time)).filter(s=>!f||s.name.includes(f)).forEach(s=>{
    const on=presence[s.id]?.is_online && Date.now()-new Date(presence[s.id].last_seen)<15000;
    const d=document.createElement('button'); d.className=`w-full text-right p-3 rounded-xl hover:bg-white/5 flex items-center gap-3 ${active===s.id?'bg-violet-950/40':''}`;
    d.innerHTML=`<div class="relative"><div class="w-12 h-12 rounded-xl bg-violet-600 grid place-items-center text-white font-bold">${s.name.slice(0,2)}</div><span class="absolute -bottom-1 -left-1 w-3 h-3 ${on?'bg-emerald-500':'bg-gray-600'} rounded-full border-2 border-[#0f172a]"></span></div><div class="flex-1 min-w-0"><div class="flex justify-between"><span class="font-semibold text-gray-100 truncate">${s.name}</span><span class="text-xs text-gray-500">${fmt(s.time)}</span></div><div class="text-xs text-gray-400 truncate">${esc(s.last)}</div></div>`;
    d.onclick=()=>open(s.id); list.appendChild(d);
  });
}
async function open(id){
  active=id; document.getElementById('empty-state').classList.add('hidden'); document.getElementById('chat-header').classList.remove('hidden'); document.getElementById('messages-container').classList.remove('hidden'); document.getElementById('input-wrap').classList.remove('hidden'); document.getElementById('chat-area').classList.remove('hidden'); document.getElementById('chat-area').classList.add('flex');
  document.getElementById('chat-student-name').textContent=students[id].name; document.getElementById('chat-avatar').textContent=students[id].name.slice(0,2);
  const p=presence[id]; const on=p?.is_online && Date.now()-new Date(p.last_seen)<15000; document.getElementById('online-dot').className=`absolute -bottom-0.5 -left-0.5 w-3 h-3 ${on?'bg-emerald-500':'bg-gray-600'} rounded-full border-2 border-[#0f172a]`; document.getElementById('chat-student-id').textContent=id+' • '+(on?'Online now':'Last seen '+fmt(p?.last_seen));
  loadMsgs();
}
async function loadMsgs(){
  const {data}=await supa.from('messages').select('*').eq('channel',ch(active)).order('created_at'); msgs.innerHTML=''; (data||[]).forEach(m=>add(m)); msgs.parentElement.scrollTop=msgs.parentElement.scrollHeight; await supa.from('messages').update({status:'read',read_at:new Date().toISOString()}).eq('channel',ch(active)).neq('from_id',T);
}
function add(m){ const me=m.from_id===T; const d=document.createElement('div'); d.className='flex '+(me?'justify-end':'justify-start'); let t=''; if(me) t=m.status==='read'?'<span class="text-sky-400">✓✓</span>':m.status==='delivered'?'<span class="text-gray-400">✓✓</span>':'<span class="text-gray-500">✓</span>'; d.innerHTML=`<div class="max-w-[75%]"><div class="${me?'bg-violet-600 text-white':'bg-[#1e293b] text-gray-100'} px-4 py-2.5 rounded-2xl ${me?'rounded-bl-md':'rounded-br-md'}">${esc(m.text)}</div><div class="text-[11px] text-gray-500 mt-1 flex gap-1 ${me?'justify-end':'justify-start'}">${fmt(m.created_at)} ${t}</div></div>`; msgs.appendChild(d); }

async function send(e){ e?.preventDefault(); const v=inp.value.trim(); if(!v||!active) return; inp.value=''; sendBtn.disabled=true; await supa.from('messages').insert({channel:ch(active),from_id:T,text:v,status:'sent'}); students[active].last=v; students[active].time=new Date().toISOString(); render(document.getElementById('search').value); sendBtn.disabled=false; inp.focus(); }

document.getElementById('message-form').addEventListener('submit',send);
inp.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); }});
inp.addEventListener('input',()=>sendBtn.disabled=!inp.value.trim());
document.getElementById('search').addEventListener('input',e=>render(e.target.value));
document.getElementById('back-btn').onclick=()=>{document.getElementById('chat-area').classList.add('hidden');active=null};
document.getElementById('delete-chat').onclick=async()=>{ if(!active||!confirm('مسح كل المحادثة؟')) return; await supa.from('messages').delete().eq('channel',ch(active)); msgs.innerHTML=''; load(); };

supa.channel('rt').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},p=>{ if(p.new.channel===ch(active)) add(p.new); load(); }).on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},p=>{ if(p.new.channel===ch(active)) loadMsgs(); }).on('postgres_changes',{event:'*',schema:'public',table:'user_presence'},load).subscribe();

load();
</script>
</body>
</html>
