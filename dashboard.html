<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأستاذ عبدالحميد - النسخة المحسنة</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- خط Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>

    <style>
        /* ============================================ */
        /* التصميم الأساسي */
        /* ============================================ */
        * {
            font-family: 'Cairo', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --bg-main: #020617;
            --bg-card: #0f172a;
            --bg-hover: #1e293b;
            --border-color: #1e293b;
            --violet-primary: #7c3aed;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--bg-main);
            color: #e2e8f0;
            margin: 0;
            padding: 0;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.15), transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            animation: floatSlow 20s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -250px;
            left: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.12), transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            animation: floatSlow 25s ease-in-out infinite reverse;
        }

        @keyframes floatSlow {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -40px) scale(1.05); }
        }

        /* Scrollbar */
        .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #4c1d95 transparent;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #4c1d95;
            border-radius: 3px;
        }

        /* انيميشن الرسائل */
        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-animate {
            animation: messageSlide 0.3s ease-out;
        }

        /* نبضة */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .animate-pulse-slow {
            animation: pulse 2s infinite;
        }
    </style>
</head>

<body>
    <!-- ============================================ -->
    <!-- الهيدر -->
    <!-- ============================================ -->
    <header class="fixed top-0 left-0 right-0 h-[72px] bg-[#0f172a]/90 backdrop-blur-xl border-b border-[#1e293b] z-50">
        <div class="h-full max-w-[1800px] mx-auto px-5 flex items-center justify-between">
            <!-- الشعار -->
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-violet-600 via-purple-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-violet-900/30">
                    <span class="text-white font-black text-xl">ع</span>
                </div>
                <div>
                    <h1 class="text-[18px] font-bold text-white leading-tight">لوحة تحكم الأستاذ عبدالحميد</h1>
                    <div class="flex items-center gap-2 mt-0.5">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse-slow"></span>
                        <span class="text-[11px] text-emerald-400 font-medium">النظام يعمل</span>
                    </div>
                </div>
            </div>

            <!-- الساعة -->
            <div class="flex items-center gap-3">
                <div class="hidden md:flex items-center gap-2 bg-[#020617] border border-violet-900/30 rounded-xl px-3.5 py-2">
                    <svg class="w-4 h-4 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span id="liveClock" class="font-mono text-sm text-violet-200">--:--:--</span>
                </div>
            </div>
        </div>
    </header>

    <!-- ============================================ -->
    <!-- المحتوى الرئيسي -->
    <!-- ============================================ -->
    <main class="pt-[72px] h-screen flex max-w-[1800px] mx-auto relative z-10">

        <!-- الشريط الجانبي -->
        <aside class="w-full lg:w-[380px] xl:w-[400px] shrink-0 bg-[#0f172a] lg:border-l border-[#1e293b] flex flex-col h-[calc(100vh-72px)]">
            <!-- البحث -->
            <div class="p-4 border-b border-white/5">
                <div class="relative">
                    <input
                        id="searchInput"
                        type="text"
                        placeholder="ابحث عن طالب..."
                        class="w-full h-[46px] bg-[#020617] border border-white/10 rounded-2xl pr-11 pl-4 text-sm outline-none focus:border-violet-500/50 focus:ring-2 focus:ring-violet-500/20 transition placeholder:text-zinc-600"
                    >
                    <svg class="w-4 h-4 text-zinc-500 absolute right-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>
                <div class="flex items-center justify-between mt-3">
                    <span class="text-xs text-zinc-500 font-semibold">المحادثات</span>
                    <span id="studentCount" class="text-xs bg-violet-950/50 text-violet-300 px-2 py-0.5 rounded-full">0</span>
                </div>
            </div>

            <!-- قائمة الطلاب -->
            <div class="flex-1 overflow-y-auto custom-scrollbar">
                <div id="studentsList" class="p-2.5 space-y-1">
                    <!-- سيتم ملؤها بـ JS -->
                </div>
            </div>
        </aside>

        <!-- منطقة المحادثة -->
        <section class="hidden lg:flex flex-1 flex-col bg-[#020617] h-[calc(100vh-72px)]">
            
            <!-- حالة فارغة افتراضية -->
            <div id="emptyState" class="flex-1 flex items-center justify-center">
                <div class="text-center px-4">
                    <div class="w-24 h-24 mx-auto mb-4 rounded-3xl bg-gradient-to-br from-violet-950/50 to-purple-950/50 flex items-center justify-center">
                        <svg class="w-12 h-12 text-violet-400/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold mb-2 text-white">اختر محادثة</h3>
                    <p class="text-zinc-500 text-sm">اختر طالب من القائمة لبدء المحادثة</p>
                </div>
            </div>

            <!-- واجهة المحادثة (مخفية مبدئياً) -->
            <div id="chatWrapper" class="hidden flex-1 flex flex-col">
                <!-- هيدر المحادثة -->
                <div id="chatHeader" class="h-[68px] bg-[#0f172a] border-b border-[#1e293b] px-5 flex items-center justify-between shrink-0">
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <div id="headerAvatar" class="w-11 h-11 rounded-xl bg-gradient-to-br from-violet-600 to-purple-600 flex items-center justify-center font-bold text-white"></div>
                            <span id="onlineDot" class="absolute -bottom-1 -left-1 w-3.5 h-3.5 bg-zinc-600 border-2 border-[#0f172a] rounded-full"></span>
                        </div>
                        <div>
                            <div id="headerName" class="font-bold text-[15px] text-white"></div>
                            <div id="headerStatus" class="text-xs text-zinc-500"></div>
                        </div>
                    </div>
                    <!-- تم إصلاح مكان الزر ليكون في الجهة الأخرى -->
                    <button id="clearChatBtn" class="text-xs bg-red-950/40 hover:bg-red-900/60 text-red-300 px-3 py-1.5 rounded-lg border border-red-900/40 transition flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        مسح المحادثة
                    </button>
                </div>

                <!-- الرسائل -->
                <div id="messagesContainer" class="flex-1 overflow-y-auto custom-scrollbar">
                    <div id="messagesList" class="min-h-full p-5 max-w-4xl mx-auto"></div>
                </div>

                <!-- الإدخال -->
                <div id="inputContainer" class="bg-[#0f172a] border-t border-[#1e293b] p-4 shrink-0">
                    <form id="messageForm" class="max-w-4xl mx-auto flex items-end gap-3">
                        <div class="flex-1">
                            <textarea
                                id="messageInput"
                                rows="1"
                                placeholder="اكتب رسالتك... (Enter للإرسال)"
                                class="w-full min-h-[46px] max-h-[120px] bg-[#020617] border border-white/10 rounded-2xl px-4 py-3 text-[15px] resize-none outline-none focus:border-violet-500/50 focus:ring-2 focus:ring-violet-500/20 transition placeholder:text-zinc-600"
                            ></textarea>
                        </div>
                        <button
                            id="sendButton"
                            type="submit"
                            disabled
                            class="h-[46px] px-6 bg-gradient-to-r from-violet-600 to-purple-600 hover:from-violet-500 hover:to-purple-500 disabled:from-zinc-800 disabled:to-zinc-800 text-white rounded-2xl font-bold transition disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            إرسال
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        // ============================================
        // الإعدادات
        // ============================================
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const supabase = createClient(
            'https://igedjuwdwyoydiyhsfyb.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZWRqdXdkd3lveWRpeWhzZnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTM0OTIsImV4cCI6MjA5MzQyOTQ5Mn0.8otVjvVT5NWx6whBvA_15ke48p6N9fUWMQE7MTnCrYg'
        );

        const TEACHER_ID = 'teacher_abdulhamid';
        let currentStudent = null;
        let studentsData = new Map();

        // العناصر
        const elements = {
            clock: document.getElementById('liveClock'),
            search: document.getElementById('searchInput'),
            studentsList: document.getElementById('studentsList'),
            studentCount: document.getElementById('studentCount'),
            emptyState: document.getElementById('emptyState'),
            chatWrapper: document.getElementById('chatWrapper'),
            messagesContainer: document.getElementById('messagesContainer'),
            messagesList: document.getElementById('messagesList'),
            headerAvatar: document.getElementById('headerAvatar'),
            headerName: document.getElementById('headerName'),
            headerStatus: document.getElementById('headerStatus'),
            onlineDot: document.getElementById('onlineDot'),
            messageForm: document.getElementById('messageForm'),
            messageInput: document.getElementById('messageInput'),
            sendButton: document.getElementById('sendButton'),
            clearChatBtn: document.getElementById('clearChatBtn')
        };

        // ============================================
        // الساعة
        // ============================================
        function updateClock() {
            const now = new Date();
            elements.clock.textContent = now.toLocaleTimeString('ar-EG', {
                hour12: true,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ============================================
        // HEARTBEAT - مهم للأونلاين
        // ============================================
        async function sendHeartbeat() {
            try {
                await supabase.from('user_presence').upsert({
                    user_id: TEACHER_ID,
                    is_online: true,
                    last_seen: new Date().toISOString()
                });
            } catch (e) {
                console.warn("Heartbeat failed", e);
            }
        }
        setInterval(sendHeartbeat, 15000); // تقليل التكرار لكل 15 ثانية
        sendHeartbeat();

        // ============================================
        // تحميل الطلاب (محسن)
        // ============================================
        async function loadStudents() {
            // تحديد الأعمدة المطلوبة فقط لتحسين السرعة
            const { data, error } = await supabase
               .from('messages')
               .select('channel, text, created_at, from_id')
               .ilike('channel', `%${TEACHER_ID}%`)
               .order('created_at', { ascending: false })
               .limit(200); // تحديد عدد النتائج لمنع الثقل

            if (error) {
                console.error(error);
                elements.studentsList.innerHTML = '<div class="text-center py-12 text-red-400">خطأ في تحميل البيانات</div>';
                return;
            }

            const map = new Map();
            
            // معالجة البيانات لاستخراج آخر رسالة لكل طالب
            data?.forEach(msg => {
                const parts = msg.channel.split(':');
                // البحث عن ID الطالب (الجزء الذي ليس ID الأستاذ)
                const studentId = parts.find(p => p !== TEACHER_ID && p.startsWith('student_'));
                
                if (studentId && !map.has(studentId)) {
                    map.set(studentId, {
                        id: studentId,
                        name: studentId.replace('student_', ''),
                        lastMessage: msg.text,
                        lastTime: msg.created_at,
                        // إذا آخر رسالة من الأستاذ -> مقروءة (لون باهت), إذا من الطالب -> جديدة (لون عادي)
                        isRead: msg.from_id === TEACHER_ID 
                    });
                }
            });

            studentsData = map;
            renderStudents();
        }

        function renderStudents() {
            const query = elements.search.value.toLowerCase().trim();
            const filtered = [...studentsData.values()].filter(s =>
               !query || s.name.toLowerCase().includes(query)
            );

            elements.studentCount.textContent = filtered.length;
            
            if (filtered.length === 0) {
                 elements.studentsList.innerHTML = `
                    <div class="text-center py-12 text-zinc-600">
                        ${query ? 'لا توجد نتائج للبحث' : 'لا توجد محادثات بعد'}
                    </div>`;
                return;
            }

            elements.studentsList.innerHTML = '';

            filtered.forEach(student => {
                const btn = document.createElement('button');
                // تمييز الرسائل غير المقروءة
                const unreadClass = !student.isRead ? 'bg-violet-900/20 border-violet-800/30' : 'border-transparent hover:bg-white/5';
                
                btn.className = `w-full p-3 rounded-xl flex items-center gap-3 text-right transition border ${unreadClass}`;
                btn.innerHTML = `
                    <div class="w-11 h-11 rounded-lg bg-gradient-to-br from-violet-600/80 to-purple-600/80 flex items-center justify-center font-bold text-sm shrink-0 text-white">
                        ${student.name.charAt(0).toUpperCase()}
                    </div>
                    <div class="flex-1 min-w-0 text-right">
                        <div class="font-medium text-sm text-white truncate">${student.name}</div>
                        <div class="text-xs text-zinc-400 truncate mt-0.5">${escapeHtml(student.lastMessage || '')}</div>
                    </div>
                    <div class="text-[10px] text-zinc-500 shrink-0 left-0">
                        ${formatTime(student.lastTime)}
                    </div>
                `;
                btn.onclick = () => openChat(student);
                elements.studentsList.appendChild(btn);
            });
        }

        // ============================================
        // فتح محادثة
        // ============================================
        async function openChat(student) {
            currentStudent = student;

            // إظهار الواجهة
            elements.emptyState.classList.add('hidden');
            elements.chatWrapper.classList.remove('hidden');
            elements.chatWrapper.classList.add('flex');

            // تحديث الهيدر
            elements.headerName.textContent = student.name;
            elements.headerAvatar.textContent = student.name.charAt(0).toUpperCase();
            elements.headerStatus.textContent = 'متصل الآن';

            // تحديث حالة القائمة الجانبية (إزالة علامة عدم القراءة)
            student.isRead = true;
            renderStudents();

            // تحميل الرسائل
            const channel = `chat:${[TEACHER_ID, student.id].sort().join(':')}`;
            const { data } = await supabase
               .from('messages')
               .select('*')
               .eq('channel', channel)
               .order('created_at', { ascending: true });

            elements.messagesList.innerHTML = '';
            
            if (data && data.length > 0) {
                data.forEach(msg => appendMessage(msg, false));
            } else {
                elements.messagesList.innerHTML = '<div class="text-center text-zinc-600 py-10">ابدأ المحادثة الآن</div>';
            }

            // علم الكل كمقروء في الداتابيز
            await supabase
               .from('messages')
               .update({ status: 'read' })
               .eq('channel', channel)
               .neq('from_id', TEACHER_ID);

            scrollToBottom();
            elements.messageInput.focus();
        }

        // ============================================
        // إضافة رسالة (مع إصلاح RTL)
        // ============================================
        function appendMessage(message, animate = true) {
            // إزالة رسالة "ابدأ المحادثة" إذا كانت موجودة
            if (elements.messagesList.querySelector('.text-center')) {
                elements.messagesList.innerHTML = '';
            }

            const isMe = message.from_id === TEACHER_ID;
            const div = document.createElement('div');
            
            // ترتيب الـ flex يعتمد على الاتجاه
            // في RTL: justify-start يعني اليمين (للطالب), justify-end يعني اليسار (لي)
            div.className = `flex ${isMe ? 'justify-end' : 'justify-start'} mb-3 group ${animate ? 'message-animate' : ''}`;
            div.dataset.messageId = message.id;

            const time = formatTime(message.created_at);

            let ticks = '';
            if (isMe) {
                if (message.status === 'read') {
                    ticks = '<span class="text-sky-400">✓✓</span>';
                } else {
                    ticks = '<span class="text-zinc-500">✓</span>';
                }
            }

            div.innerHTML = `
                <div class="relative max-w-[75%]">
                    <div class="${isMe
                       ? 'bg-gradient-to-r from-violet-600 to-purple-600 text-white'
                        : 'bg-[#1e293b] border border-white/5 text-white'
                    } px-4 py-2.5 rounded-2xl ${isMe ? 'rounded-bl-sm' : 'rounded-br-sm'} shadow-md">
                        <p class="text-[14px] leading-relaxed whitespace-pre-wrap break-words">${escapeHtml(message.text)}</p>
                    </div>
                    <div class="flex items-center gap-1.5 mt-1 px-1 ${isMe ? 'justify-end' : 'justify-start'}">
                        <span class="text-[11px] text-zinc-500">${time}</span>
                        ${ticks ? `<span class="text-xs">${ticks}</span>` : ''}
                    </div>
                    
                    <!-- زر الحذف - تم إصلاح الموقع ل RTL -->
                    <button
                        onclick="deleteMessage('${message.id}')"
                        class="absolute ${isMe ? '-left-8' : '-right-8'} top-2 w-7 h-7 bg-red-900/80 hover:bg-red-800 rounded-lg grid place-items-center opacity-0 group-hover:opacity-100 transition-all"
                        title="حذف الرسالة"
                    >
                        <svg class="w-3.5 h-3.5 text-red-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            `;

            elements.messagesList.appendChild(div);
        }

        // حذف رسالة
        window.deleteMessage = async (id) => {
            if (!confirm('هل أنت متأكد من حذف هذه الرسالة؟')) return;
            const { error } = await supabase.from('messages').delete().eq('id', id);
            if (!error) {
                document.querySelector(`[data-message-id="${id}"]`)?.remove();
            }
        };

        // ============================================
        // إرسال رسالة
        // ============================================
        elements.messageForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = elements.messageInput.value.trim();
            if (!text || !currentStudent) return;

            // مسح الحقل فوراً
            elements.messageInput.value = '';
            elements.messageInput.style.height = 'auto';
            elements.sendButton.disabled = true;

            // ارسم الرسالة فوراً (Optimistic UI)
            const tempId = 'temp_' + Date.now();
            const tempMessage = {
                id: tempId,
                from_id: TEACHER_ID,
                text: text,
                created_at: new Date().toISOString(),
                status: 'sent'
            };
            appendMessage(tempMessage, true);
            scrollToBottom();

            // أرسل للسيرفر
            const channel = `chat:${[TEACHER_ID, currentStudent.id].sort().join(':')}`;
            try {
                const { data } = await supabase
                   .from('messages')
                   .insert({
                        channel: channel,
                        from_id: TEACHER_ID,
                        text: text,
                        status: 'sent'
                    })
                   .select()
                   .single();

                // استبدال المؤقتة بالحقيقية
                document.querySelector(`[data-message-id="${tempId}"]`)?.remove();
                if (data) {
                    appendMessage(data, false);
                    scrollToBottom();
                }

                // تحديث القائمة الجانبية
                loadStudents();

            } catch (error) {
                console.error('Send error:', error);
                // إزالة الرسالة المؤقتة عند الخطأ
                document.querySelector(`[data-message-id="${tempId}"]`)?.remove();
                alert('فشل الإرسال، تحقق من الاتصال');
            }
        };

        // ============================================
        // أحداث الإدخال
        // ============================================
        elements.messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                elements.messageForm.requestSubmit();
            }
        });

        elements.messageInput.addEventListener('input', () => {
            elements.messageInput.style.height = 'auto';
            elements.messageInput.style.height = Math.min(elements.messageInput.scrollHeight, 120) + 'px';
            elements.sendButton.disabled = !elements.messageInput.value.trim();
        });

        // ============================================
        // مسح المحادثة
        // ============================================
        elements.clearChatBtn.onclick = async () => {
            if (!currentStudent || !confirm('هل أنت متأكد من مسح المحادثة بالكامل؟ لا يمكن التراجع.')) return;

            const channel = `chat:${[TEACHER_ID, currentStudent.id].sort().join(':')}`;
            await supabase.from('messages').delete().eq('channel', channel);
            elements.messagesList.innerHTML = '';
            loadStudents();
        };

        // ============================================
        // Realtime Listeners
        // ============================================
        supabase
           .channel('teacher-realtime')
           .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                const msg = payload.new;
                if (!msg.channel.includes(TEACHER_ID)) return;

                const studentId = msg.channel.split(':').find(id => id.startsWith('student_'));

                // إذا الرسالة قادمة من الطالب الحالي
                if (studentId === currentStudent?.id && msg.from_id !== TEACHER_ID) {
                    appendMessage(msg, true);
                    scrollToBottom();
                    // علم كمستلم
                    supabase.from('messages').update({ status: 'read' }).eq('id', msg.id);
                }
                
                // تحديث القائمة دائماً
                loadStudents();
            })
           .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages' }, (payload) => {
                const msg = payload.new;
                const el = document.querySelector(`[data-message-id="${msg.id}"]`);
                if (el) {
                    el.remove();
                    appendMessage(msg, false);
                }
            })
           .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, (payload) => {
                document.querySelector(`[data-message-id="${payload.old.id}"]`)?.remove();
            })
           .subscribe();

        // ============================================
        // دوال مساعدة
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(dateStr) {
            if (!dateStr) return '';
            return new Date(dateStr).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', hour12: true });
        }

        function scrollToBottom() {
            elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
        }

        // بحث محسن
        let searchTimeout;
        elements.search.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(renderStudents, 300);
        });

        // بدء التطبيق
        loadStudents();
    </script>
</body>
</html>
