<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- ========================================================= -->
    <!-- ========== منصة الأستاذ عبدالحميد - لوحة تحكم Pro ========== -->
    <!-- ========================================================= -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأستاذ عبدالحميد - نسخة احترافية</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- خط Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>

    <style>
        /* ========================================================= */
        /* ========== التصميم الأساسي ========== */
        /* ========================================================= */
        * {
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --bg-main: #020617;
            --bg-card: #0f172a;
            --bg-hover: #1e293b;
            --border: #1e293b;
            --violet: #7c3aed;
            --purple: #9333ea;
        }

        body {
            background-color: var(--bg-main);
            color: #e2e8f0;
            overflow: hidden;
        }

        /* Scrollbar مخصص */
       .custom-scroll {
            scrollbar-width: thin;
            scrollbar-color: #4c1d95 transparent;
        }

       .custom-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

       .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

       .custom-scroll::-webkit-scrollbar-thumb {
            background: #4c1d95;
            border-radius: 3px;
        }

       .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #6d28d9;
        }

        /* انيميشن الرسائل */
        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

       .message-enter {
            animation: messageSlideIn 0.28s ease-out;
        }

        /* نبضة الأونلاين */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

       .pulse {
            animation: pulse 2s infinite;
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden">
    <!-- ========================================================= -->
    <!-- ========== الهيدر العلوي ========== -->
    <!-- ========================================================= -->
    <header class="fixed top-0 left-0 right-0 h-[72px] bg-[#0f172a] border-b border-[#1e293b] z-40 backdrop-blur-xl bg-opacity-95">
        <div class="h-full max-w-[1800px] mx-auto px-4 lg:px-6 flex items-center justify-between">

            <!-- الشعار والعنوان -->
            <div class="flex items-center gap-4">
                <div class="w-[48px] h-[48px] rounded-2xl bg-gradient-to-br from-violet-600 via-purple-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-violet-900/30 ring-1 ring-white/10">
                    <span class="text-white font-black text-[22px]">ع</span>
                </div>
                <div>
                    <h1 class="text-[18px] font-bold text-white leading-tight tracking-wide">
                        لوحة تحكم الأستاذ عبدالحميد
                    </h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full pulse"></span>
                        <span class="text-[11px] text-emerald-400 font-medium">متصل ومزامن</span>
                        <span class="text-[11px] text-zinc-600">•</span>
                        <span class="text-[11px] text-zinc-500">منصة الكيمياء</span>
                    </div>
                </div>
            </div>

            <!-- الساعة والإشعارات -->
            <div class="flex items-center gap-3">
                <!-- الساعة -->
                <div id="headerClock" class="hidden sm:flex items-center gap-2.5 bg-[#020617] border border-violet-900/30 rounded-xl px-3.5 py-2">
                    <svg class="w-4 h-4 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span class="font-mono text-[13px] text-violet-200 font-medium tracking-wider">--:--:--</span>
                </div>

                <!-- زر الإشعارات -->
                <button class="relative w-10 h-10 grid place-items-center bg-white/5 hover:bg-white/10 rounded-xl transition border border-white/5">
                    <svg class="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0.538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                    </svg>
                    <span id="notifBadge" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-[10px] font-bold rounded-full grid place-items-center shadow-lg hidden">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ========================================================= -->
    <!-- ========== المحتوى الرئيسي ========== -->
    <!-- ========================================================= -->
    <main class="pt-[72px] h-screen w-screen flex max-w-[1800px] mx-auto">

        <!-- ========== الشريط الجانبي - قائمة الطلاب ========== -->
        <aside id="sidebar" class="w-full lg:w-[380px] xl:w-[420px] shrink-0 bg-[#0f172a] lg:border-l border-[#1e293b] flex flex-col h-[calc(100vh-72px)]">

            <!-- شريط البحث -->
            <div class="p-4 border-b border-white/[0.05]">
                <div class="relative">
                    <input
                        id="searchInput"
                        type="text"
                        placeholder="ابحث عن طالب بالاسم أو الرقم..."
                        class="w-full h-[48px] bg-[#020617] border border-white/10 rounded-2xl pr-12 pl-4 text-[14px] text-zinc-200 placeholder-zinc-600 outline-none focus:border-violet-500/50 focus:ring-4 focus:ring-violet-500/10 transition-all"
                    >
                    <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>

                <!-- إحصائيات -->
                <div class="flex items-center justify-between mt-3.5 px-1">
                    <span class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest">المحادثات</span>
                    <div class="flex items-center gap-2">
                        <span id="onlineCount" class="text-[11px] bg-emerald-950/50 text-emerald-400 px-2.5 py-1 rounded-full border border-emerald-900/50 font-medium">0 متصل</span>
                        <span id="totalStudents" class="text-[11px] bg-violet-950/50 text-violet-300 px-2.5 py-1 rounded-full border border-violet-900/50 font-medium">0</span>
                    </div>
                </div>
            </div>

            <!-- قائمة الطلاب -->
            <div class="flex-1 overflow-y-auto custom-scroll">
                <div id="studentsContainer" class="p-3 space-y-1">
                    <!-- سيتم ملؤها بـ JavaScript -->
                    <div class="flex items-center justify-center py-16">
                        <div class="text-center">
                            <div class="w-8 h-8 border-2 border-violet-600 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
                            <p class="text-sm text-zinc-600">جاري تحميل الطلاب...</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ========== منطقة المحادثة ========== -->
        <section id="chatSection" class="flex-1 flex flex-col bg-[#020617] h-[calc(100vh-72px)] relative">

            <!-- حالة فارغة -->
            <div id="emptyState" class="flex-1 flex items-center justify-center p-8">
                <div class="text-center max-w-[360px]">
                    <div class="w-[120px] h-[120px] mx-auto mb-7 rounded-[32px] bg-gradient-to-br from-violet-950/70 to-purple-950/70 border border-violet-900/30 flex items-center justify-center shadow-2xl shadow-violet-950/20">
                        <svg class="w-16 h-16 text-violet-400/70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                        </svg>
                    </div>
                    <h2 class="text-[24px] font-bold text-white mb-3">مرحباً بك أستاذ عبدالحميد</h2>
                    <p class="text-[15px] text-zinc-500 leading-relaxed">اختر محادثة من القائمة الجانبية لبدء التواصل المباشر مع طلابك ومتابعة استفساراتهم</p>
                    <div class="mt-6 flex items-center justify-center gap-4 text-[12px] text-zinc-600">
                        <div class="flex items-center gap-1.5"><div class="w-2 h-2 bg-emerald-500 rounded-full"></div>متصل</div>
                        <div class="flex items-center gap-1.5"><div class="w-2 h-2 bg-zinc-600 rounded-full"></div>غير متصل</div>
                    </div>
                </div>
            </div>

            <!-- هيدر المحادثة -->
            <div id="chatHeader" class="hidden h-[70px] bg-[#0f172a]/80 backdrop-blur-xl border-b border-[#1e293b] px-5 flex items-center justify-between shrink-0 sticky top-0 z-10">
                <div class="flex items-center gap-3.5 min-w-0 flex-1">
                    <!-- زر الرجوع موبايل -->
                    <button id="btnBack" class="lg:hidden w-9 h-9 -mr-2 grid place-items-center hover:bg-white/5 rounded-xl transition">
                        <svg class="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>

                    <!-- صورة الطالب -->
                    <div class="relative shrink-0">
                        <div id="studentAvatar" class="w-[48px] h-[48px] rounded-2xl bg-gradient-to-br from-violet-600 to-purple-600 flex items-center justify-center text-white font-bold text-[18px] shadow-md ring-2 ring-[#0f172a]"></div>
                        <span id="studentOnlineDot" class="absolute -bottom-1 -left-1 w-4 h-4 bg-zinc-600 border-[3px] border-[#0f172a] rounded-full transition-all duration-300"></span>
                    </div>

                    <!-- معلومات الطالب -->
                    <div class="min-w-0 flex-1">
                        <h3 id="studentName" class="font-bold text-[16px] text-white truncate"></h3>
                        <p id="studentStatus" class="text-[12px] text-zinc-400 truncate mt-0.5"></p>
                    </div>
                </div>

                <!-- أزرار التحكم -->
                <div class="flex items-center gap-2 shrink-0">
                    <button id="btnClearChat" class="h-9 px-3.5 bg-red-950/40 hover:bg-red-900/60 text-red-300 hover:text-red-200 border border-red-900/40 hover:border-red-800/60 rounded-xl text-[13px] font-medium transition-all flex items-center gap-1.5 group">
                        <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                        <span class="hidden sm:inline">مسح المحادثة</span>
                    </button>
                </div>
            </div>

            <!-- منطقة الرسائل -->
            <div id="messagesWrapper" class="hidden flex-1 overflow-y-auto custom-scroll bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-violet-950/[0.03] via-transparent to-transparent">
                <div id="messagesList" class="min-h-full px-4 md:px-6 lg:px-8 py-6 max-w-5xl mx-auto">
                    <!-- الرسائل ستظهر هنا -->
                </div>
            </div>

            <!-- منطقة الإدخال -->
            <div id="inputArea" class="hidden bg-[#0f172a]/90 backdrop-blur-xl border-t border-[#1e293b] p-4 shrink-0">
                <form id="messageForm" class="max-w-5xl mx-auto">
                    <div class="flex items-end gap-3">
                        <!-- زر مرفقات -->
                        <button type="button" class="w-[46px] h-[46px] grid place-items-center text-zinc-500 hover:text-violet-400 hover:bg-violet-950/30 rounded-2xl transition shrink-0 border border-transparent hover:border-violet-900/30">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
                            </svg>
                        </button>

                        <!-- حقل النص -->
                        <div class="flex-1 relative">
                            <textarea
                                id="messageInput"
                                placeholder="اكتب رسالتك هنا... اضغط Enter للإرسال"
                                rows="1"
                                class="w-full min-h-[46px] max-h-[160px] bg-[#020617] border border-white/10 rounded-2xl px-4 py-3 pr-12 text-[15px] leading-relaxed text-zinc-100 placeholder-zinc-600 outline-none resize-none focus:border-violet-500/50 focus:ring-4 focus:ring-violet-500/10 transition-all"
                            ></textarea>
                            <div class="absolute left-3 bottom-2.5 flex items-center gap-1">
                                <kbd class="hidden md:inline-flex items-center px-1.5 py-0.5 bg-white/5 border border-white/10 rounded text-[10px] text-zinc-600 font-mono">↵</kbd>
                            </div>
                        </div>

                        <!-- زر الإرسال -->
                        <button
                            id="sendButton"
                            type="submit"
                            disabled
                            class="w-[46px] h-[46px] bg-gradient-to-r from-violet-600 to-purple-600 hover:from-violet-500 hover:to-purple-500 disabled:from-zinc-800 disabled:to-zinc-800 disabled:text-zinc-600 text-white rounded-2xl grid place-items-center shadow-lg shadow-violet-950/25 hover:shadow-xl hover:shadow-violet-900/30 hover:-translate-y-0.5 active:translate-y-0 transition-all shrink-0 disabled:shadow-none disabled:hover:translate-y-0"
                        >
                            <svg class="w-5 h-5 -scale-x-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- ========================================================= -->
    <!-- ========== JavaScript الرئيسي ========== -->
    <!-- ========================================================= -->
    <script type="module">
        // =========================================================
        // الإعدادات والثوابت
        // =========================================================
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const CONFIG = {
            SUPABASE_URL: 'https://igedjuwdwyoydiyhsfyb.supabase.co',
            SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZWRqdXdkd3lveWRpeWhzZnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTM0OTIsImV4cCI6MjA5MzQyOTQ5Mn0.8otVjvVT5NWx6whBvA_15ke48p6N9fUWMQE7MTnCrYg',
            TEACHER_ID: 'teacher_abdulhamid',
            HEARTBEAT_INTERVAL: 8000,
            ONLINE_THRESHOLD: 15000
        };

        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        // =========================================================
        // الحالة العامة
        // =========================================================
        let state = {
            activeStudentId: null,
            students: new Map(),
            presence: new Map(),
            messages: [],
            isSending: false
        };

        // =========================================================
        // العناصر
        // =========================================================
        const els = {
            clock: document.querySelector('#headerClock span'),
            search: document.getElementById('searchInput'),
            studentsList: document.getElementById('studentsContainer'),
            totalCount: document.getElementById('totalStudents'),
            onlineCount: document.getElementById('onlineCount'),
            notifBadge: document.getElementById('notifBadge'),
            emptyState: document.getElementById('emptyState'),
            chatHeader: document.getElementById('chatHeader'),
            messagesWrap: document.getElementById('messagesWrapper'),
            messagesList: document.getElementById('messagesList'),
            inputArea: document.getElementById('inputArea'),
            studentAvatar: document.getElementById('studentAvatar'),
            studentName: document.getElementById('studentName'),
            studentStatus: document.getElementById('studentStatus'),
            studentOnlineDot: document.getElementById('studentOnlineDot'),
            messageForm: document.getElementById('messageForm'),
            messageInput: document.getElementById('messageInput'),
            sendButton: document.getElementById('sendButton'),
            btnBack: document.getElementById('btnBack'),
            btnClear: document.getElementById('btnClearChat')
        };

        // =========================================================
        // 1. الساعة
        // =========================================================
        function updateClock() {
            const now = new Date();
            els.clock.textContent = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // =========================================================
        // 2. HEARTBEAT - حل مشكلة الأونلاين
        // =========================================================
        async function sendHeartbeat() {
            try {
                await supabase.from('user_presence').upsert({
                    user_id: CONFIG.TEACHER_ID,
                    is_online: true,
                    last_seen: new Date().toISOString()
                }, { onConflict: 'user_id' });
            } catch (e) {
                console.error('Heartbeat failed:', e);
            }
        }
        setInterval(sendHeartbeat, CONFIG.HEARTBEAT_INTERVAL);
        sendHeartbeat();
        window.addEventListener('beforeunload', () => {
            supabase.from('user_presence').update({ is_online: false }).eq('user_id', CONFIG.TEACHER_ID);
        });

        // =========================================================
        // 3. تحميل البيانات
        // =========================================================
        async function loadInitialData() {
            try {
                const [presenceRes, messagesRes] = await Promise.all([
                    supabase.from('user_presence').select('*'),
                    supabase.from('messages').select('*').ilike('channel', `%${CONFIG.TEACHER_ID}%`).order('created_at', { ascending: false }).limit(2000)
                ]);

                // حفظ الحضور
                state.presence = new Map(presenceRes.data?.map(p => [p.user_id, p]) || []);

                // بناء قائمة الطلاب
                const studentsMap = new Map();
                messagesRes.data?.forEach(msg => {
                    if (!studentsMap.has(msg.channel)) {
                        const studentId = msg.channel.split(':').find(id => id.startsWith('student_'));
                        if (studentId) {
                            studentsMap.set(msg.channel, {
                                id: studentId,
                                name: studentId.replace('student_', ''),
                                channel: msg.channel,
                                lastMessage: msg.text || '',
                                lastTime: msg.created_at,
                                unread: 0
                            });
                        }
                    }
                });

                state.students = studentsMap;
                renderStudentsList();
                updateCounters();

            } catch (error) {
                console.error('Load error:', error);
                els.studentsList.innerHTML = `<div class="text-center py-12 text-red-400">خطأ في التحميل</div>`;
            }
        }

        // =========================================================
        // 4. عرض الطلاب
        // =========================================================
        function renderStudentsList() {
            const query = els.search.value.toLowerCase();
            const students = [...state.students.values()]
               .filter(s =>!query || s.name.toLowerCase().includes(query))
               .sort((a, b) => new Date(b.lastTime) - new Date(a.lastTime));

            if (students.length === 0) {
                els.studentsList.innerHTML = `<div class="text-center py-12 px-4"><p class="text-zinc-600 text-sm">${query? 'لا توجد نتائج' : 'لا يوجد طلاب بعد'}</p></div>`;
                return;
            }

            els.studentsList.innerHTML = '';
            students.forEach(student => {
                const presence = state.presence.get(student.id);
                const isOnline = presence?.is_online && (Date.now() - new Date(presence.last_seen).getTime() < CONFIG.ONLINE_THRESHOLD);

                const item = document.createElement('button');
                item.className = `group w-full p-3 rounded-2xl text-right transition-all border ${state.activeStudentId === student.id? 'bg-violet-950/40 border-violet-800/50' : 'hover:bg-white/[0.02] border-transparent hover:border-white/5'}`;
                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="relative shrink-0">
                            <div class="w-[48px] h-[48px] rounded-xl bg-gradient-to-br from-violet-600/90 to-purple-700/90 flex items-center justify-center text-white font-bold text-[15px] shadow-md group-hover:shadow-lg group-hover:shadow-violet-900/20 transition-all">
                                ${student.name.slice(0, 2).toUpperCase()}
                            </div>
                            <span class="absolute -bottom-1 -left-1 w-3.5 h-3.5 ${isOnline? 'bg-emerald-500' : 'bg-zinc-700'} border-[2.5px] border-[#0f172a] rounded-full transition-colors"></span>
                        </div>
                        <div class="flex-1 min-w-0 text-right">
                            <div class="flex items-baseline justify-between gap-2 mb-1">
                                <h4 class="font-semibold text-[14px] text-zinc-100 truncate">${escapeHtml(student.name)}</h4>
                                <span class="text-[11px] text-zinc-500 shrink-0 font-mono">${formatTime(student.lastTime)}</span>
                            </div>
                            <p class="text-[13px] text-zinc-500 truncate leading-snug">${escapeHtml(student.lastMessage || 'ابدأ المحادثة...')}</p>
                        </div>
                    </div>
                `;
                item.onclick = () => openStudentChat(student.id);
                els.studentsList.appendChild(item);
            });
        }

        function updateCounters() {
            const total = state.students.size;
            const online = [...state.students.values()].filter(s => {
                const p = state.presence.get(s.id);
                return p?.is_online && (Date.now() - new Date(p.last_seen).getTime() < CONFIG.ONLINE_THRESHOLD);
            }).length;

            els.totalCount.textContent = total;
            els.onlineCount.textContent = `${online} متصل`;
        }

        // =========================================================
        // 5. فتح محادثة - حل مشكلة الظهور
        // =========================================================
        async function openStudentChat(studentId) {
            state.activeStudentId = studentId;
            const student = [...state.students.values()].find(s => s.id === studentId);

            // إظهار الواجهة
            els.emptyState.classList.add('hidden');
            els.chatHeader.classList.remove('hidden');
            els.messagesWrap.classList.remove('hidden');
            els.inputArea.classList.remove('hidden');

            // تحديث الهيدر
            els.studentName.textContent = student.name;
            els.studentAvatar.textContent = student.name.slice(0, 2).toUpperCase();
            updateStudentStatus();

            // تحميل الرسائل
            await loadChatMessages();
            els.messageInput.focus();
            renderStudentsList();
        }

        function updateStudentStatus() {
            const presence = state.presence.get(state.activeStudentId);
            const isOnline = presence?.is_online && (Date.now() - new Date(presence.last_seen).getTime() < CONFIG.ONLINE_THRESHOLD);

            els.studentOnlineDot.className = `absolute -bottom-1 -left-1 w-4 h-4 ${isOnline? 'bg-emerald-500' : 'bg-zinc-600'} border-[3px] border-[#0f172a] rounded-full transition-all`;
            els.studentStatus.textContent = isOnline? 'متصل الآن' : `آخر ظهور ${formatTime(presence?.last_seen)}`;
        }

        // =========================================================
        // 6. الرسائل
        // =========================================================
        async function loadChatMessages() {
            const channel = getChannel(state.activeStudentId);
            els.messagesList.innerHTML = '<div class="flex justify-center py-12"><div class="w-6 h-6 border-2 border-violet-600 border-t-transparent rounded-full animate-spin"></div></div>';

            try {
                const { data, error } = await supabase.from('messages').select('*').eq('channel', channel).order('created_at', { ascending: true });
                if (error) throw error;

                state.messages = data || [];
                renderMessages();

                // علم كمقروء
                await supabase.from('messages').update({ status: 'read', read_at: new Date().toISOString() }).eq('channel', channel).neq('from_id', CONFIG.TEACHER_ID);

            } catch (e) {
                console.error(e);
                els.messagesList.innerHTML = '<div class="text-center py-12 text-red-400">فشل تحميل الرسائل</div>';
            }
        }

        function renderMessages() {
            els.messagesList.innerHTML = '';
            let lastDate = null;

            state.messages.forEach(msg => {
                const msgDate = new Date(msg.created_at).toDateString();
                if (msgDate!== lastDate) {
                    lastDate = msgDate;
                    const dateDiv = document.createElement('div');
                    dateDiv.className = 'flex justify-center my-6';
                    dateDiv.innerHTML = `<span class="bg-[#0f172a] border border-white/5 px-3 py-1 rounded-full text-[11px] text-zinc-500">${new Date(msg.created_at).toLocaleDateString('ar-EG', { weekday: 'long', month: 'long', day: 'numeric' })}</span>`;
                    els.messagesList.appendChild(dateDiv);
                }
                appendMessageElement(msg, false);
            });

            els.messagesWrap.scrollTop = els.messagesWrap.scrollHeight;
        }

        function appendMessageElement(message, animate = true) {
            const isMe = message.from_id === CONFIG.TEACHER_ID;
            const div = document.createElement('div');
            div.className = `flex ${isMe? 'justify-end' : 'justify-start'} mb-3.5 ${animate? 'message-enter' : ''} group`;
            div.dataset.messageId = message.id;

            let ticks = '';
            if (isMe) {
                if (message.status === 'read') ticks = '<span class="text-sky-400">✓✓</span>';
                else if (message.status === 'delivered') ticks = '<span class="text-zinc-500">✓✓</span>';
                else ticks = '<span class="text-zinc-600">✓</span>';
            }

            div.innerHTML = `
                <div class="relative max-w-[78%] md:max-w-[68%]">
                    <div class="${isMe? 'bg-gradient-to-r from-violet-600 to-purple-600 text-white shadow-lg shadow-violet-950/20 rounded-[18px] rounded-bl-[4px]' : 'bg-[#1e293b] border border-white/5 text-zinc-100 rounded-[18px] rounded-br-[4px]'} px-4 py-2.5">
                        <p class="text-[14.5px] leading-[1.65] whitespace-pre-wrap break-words">${escapeHtml(message.text)}</p>
                    </div>
                    <div class="flex items-center gap-1.5 mt-1.5 px-1 ${isMe? 'justify-end' : 'justify-start'}">
                        <span class="text-[11px] text-zinc-500 font-mono">${formatTime(message.created_at)}</span>
                        ${ticks? `<span class="text-[13px] leading-none">${ticks}</span>` : ''}
                    </div>
                    <!-- زر الحذف - حل مشكلة 4 -->
                    <button data-delete="${message.id}" class="absolute ${isMe? '-left-10' : '-right-10'} top-2 w-8 h-8 bg-red-950/90 hover:bg-red-900 border border-red-900/50 rounded-lg grid place-items-center opacity-0 group-hover:opacity-100 transition-all hover:scale-105" title="حذف الرسالة">
                        <svg class="w-3.5 h-3.5 text-red-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            `;

            div.querySelector('[data-delete]').onclick = () => deleteSingleMessage(message.id);
            els.messagesList.appendChild(div);
        }

        // =========================================================
        // 7. الإرسال - Optimistic UI
        // =========================================================
        els.messageForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = els.messageInput.value.trim();
            if (!text ||!state.activeStudentId || state.isSending) return;

            state.isSending = true;
            els.messageInput.value = '';
            els.messageInput.style.height = 'auto';
            els.sendButton.disabled = true;

            // ارسم فوراً
            const tempId = 'temp_' + Date.now();
            const tempMsg = { id: tempId, from_id: CONFIG.TEACHER_ID, text, created_at: new Date().toISOString(), status: 'sent', channel: getChannel(state.activeStudentId) };
            appendMessageElement(tempMsg, true);
            els.messagesWrap.scrollTop = els.messagesWrap.scrollHeight;

            try {
                const { data, error } = await supabase.from('messages').insert({
                    channel: getChannel(state.activeStudentId),
                    from_id: CONFIG.TEACHER_ID,
                    text: text,
                    status: 'sent'
                }).select().single();

                document.querySelector(`[data-message-id="${tempId}"]`)?.remove();

                if (!error && data) {
                    appendMessageElement(data, true);
                    state.messages.push(data);
                    // تحديث القائمة
                    const student = [...state.students.values()].find(s => s.id === state.activeStudentId);
                    if (student) { student.lastMessage = text; student.lastTime = data.created_at; renderStudentsList(); }
                }
            } catch (err) {
                console.error('Send failed:', err);
                alert('فشل الإرسال');
            } finally {
                state.isSending = false;
                els.sendButton.disabled = false;
                els.messageInput.focus();
            }
        };

        // =========================================================
        // 8. الحذف
        // =========================================================
        async function deleteSingleMessage(messageId) {
            if (!confirm('هل تريد حذف هذه الرسالة نهائياً؟')) return;
            await supabase.from('messages').delete().eq('id', messageId);
        }

        els.btnClear.onclick = async () => {
            if (!state.activeStudentId ||!confirm('مسح المحادثة بالكامل من الطرفين؟')) return;
            await supabase.from('messages').delete().eq('channel', getChannel(state.activeStudentId));
            els.messagesList.innerHTML = '';
            state.messages = [];
            loadInitialData();
        };

        // =========================================================
        // 9. Realtime
        // =========================================================
        supabase.channel('teacher-rt')
           .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                const msg = payload.new;
                if (!msg.channel.includes(CONFIG.TEACHER_ID)) return;

                const studentId = msg.channel.split(':').find(id => id.startsWith('student_'));
                const student = [...state.students.values()].find(s => s.id === studentId);
                if (student) { student.lastMessage = msg.text; student.lastTime = msg.created_at; renderStudentsList(); updateCounters(); }

                if (studentId === state.activeStudentId &&!document.querySelector(`[data-message-id="${msg.id}"]`)) {
                    appendMessageElement(msg, true);
                    els.messagesWrap.scrollTop = els.messagesWrap.scrollHeight;
                    if (msg.from_id!== CONFIG.TEACHER_ID) {
                        supabase.from('messages').update({ status: 'delivered', delivered_at: new Date().toISOString() }).eq('id', msg.id);
                    }
                }
            })
           .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages' }, payload => {
                const msg = payload.new;
                if (msg.channel === getChannel(state.activeStudentId)) {
                    const el = document.querySelector(`[data-message-id="${msg.id}"]`);
                    if (el) { el.remove(); appendMessageElement(msg, false); }
                }
            })
           .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, payload => {
                document.querySelector(`[data-message-id="${payload.old.id}"]`)?.remove();
            })
           .on('postgres_changes', { event: '*', schema: 'public', table: 'user_presence' }, () => {
                loadInitialData();
                if (state.activeStudentId) updateStudentStatus();
            })
           .subscribe();

        // =========================================================
        // أدوات مساعدة
        // =========================================================
        function getChannel(studentId) { return `chat:${[CONFIG.TEACHER_ID, studentId].sort().join(':')}`; }
        function escapeHtml(str) { return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
        function formatTime(ts) { return new Date(ts).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }); }

        // أحداث
        els.search.oninput = renderStudentsList;
        els.btnBack.onclick = () => { state.activeStudentId = null; els.chatHeader.classList.add('hidden'); els.messagesWrap.classList.add('hidden'); els.inputArea.classList.add('hidden'); els.emptyState.classList.remove('hidden'); };
        els.messageInput.oninput = () => { els.messageInput.style.height = 'auto'; els.messageInput.style.height = Math.min(els.messageInput.scrollHeight, 160) + 'px'; els.sendButton.disabled =!els.messageInput.value.trim(); };

        // بدء
        loadInitialData();
    </script>
</body>
</html>
