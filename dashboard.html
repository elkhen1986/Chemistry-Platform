<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم الأستاذ عبدالحميد</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{font-family:'Cairo',sans-serif}
body{background:#020617;color:#e2e8f0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#4c1d95;border-radius:3px}
.msg-enter{animation:slide.25s ease}@keyframes slide{from{opacity:0;transform:translateY(8px)}}
</style>
</head>
<body class="h-screen overflow-hidden">
<!-- Header -->
<header class="h-[70px] bg-[#0f172a]/95 backdrop-blur border-b border-slate-800 fixed top-0 inset-x-0 z-40">
  <div class="h-full max-w-[1600px] mx-auto px-5 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-violet-600 to-purple-600 grid place-items-center shadow-lg">
        <span class="text-white font-black text-xl">ع</span>
      </div>
      <div>
        <h1 class="font-bold text-[17px]">لوحة تحكم الأستاذ عبدالحميد</h1>
        <div class="flex items-center gap-1.5 mt-0.5">
          <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
          <span class="text-[11px] text-emerald-400">النظام يعمل</span>
        </div>
      </div>
    </div>
    <div id="clock" class="font-mono text-violet-300 text-sm"></div>
  </div>
</header>

<main class="pt-[70px] h-screen flex">
  <!-- Sidebar -->
  <aside class="w-[380px] bg-[#0f172a] border-l border-slate-800 flex flex-col h-[calc(100vh-70px)]">
    <div class="p-4">
      <input id="search" placeholder="ابحث عن طالب..." class="w-full h-11 bg-[#020617] border border-slate-800 rounded-xl px-4 outline-none focus:border-violet-600 transition">
    </div>
    <div id="students" class="flex-1 overflow-y-auto px-3 pb-3 space-y-1"></div>
  </aside>

  <!-- Chat -->
  <section class="flex-1 flex flex-col bg-[#020617]">
    <div id="empty" class="flex-1 grid place-items-center text-zinc-600">
      <div class="text-center">
        <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-violet-950/50 grid place-items-center">
          <svg class="w-10 h-10 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        </div>
        <p>اختر محادثة من القائمة</p>
      </div>
    </div>

    <div id="chatHead" class="hidden h-[64px] bg-[#0f172a] border-b border-slate-800 px-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div id="avatar" class="w-10 h-10 rounded-xl bg-violet-600 grid place-items-center font-bold"></div>
        <div>
          <div id="studentName" class="font-bold"></div>
          <div id="studentStatus" class="text-xs text-zinc-500">متصل</div>
        </div>
      <button id="clearBtn" class="text-xs px-3 py-1.5 bg-red-950/50 hover:bg-red-900/70 text-red-300 rounded-lg border border-red-900/50 transition">مسح المحادثة</button>
    </div>

    <div id="msgsWrap" class="hidden flex-1 overflow-y-auto">
      <div id="msgs" class="max-w-4xl mx-auto p-5 space-y-3"></div>
    </div>

    <div id="inputWrap" class="hidden p-4 bg-[#0f172a] border-t border-slate-800">
      <form id="form" class="max-w-4xl mx-auto flex gap-2">
        <textarea id="input" rows="1" placeholder="اكتب رسالتك... Enter للإرسال" class="flex-1 bg-[#020617] border border-slate-800 rounded-xl px-4 py-2.5 resize-none outline-none focus:border-violet-600 max-h-32"></textarea>
        <button class="px-6 bg-violet-600 hover:bg-violet-500 disabled:opacity-40 rounded-xl font-bold transition" disabled>إرسال</button>
      </form>
    </div>
  </section>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const supa = createClient('https://igedjuwdwyoydiyhsfyb.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZWRqdXdkd3lveWRpeWhzZnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTM0OTIsImV4cCI6MjA5MzQyOTQ5Mn0.8otVjvVT5NWx6whBvA_15ke48p6N9fUWMQE7MTnCrYg');
const ME = 'teacher_abdulhamid';
let active = null;

// الساعة
setInterval(()=> clock.textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),1000);

// 1- HEARTBEAT للأونلاين
setInterval(async ()=> {
  await supa.from('user_presence').upsert({user_id:ME, is_online:true, last_seen:new Date().toISOString()});
}, 4000);

// 2- تحميل الطلاب
async function loadStudents(){
  const {data} = await supa.from('messages').select('*').ilike('channel',`%${ME}%`).order('created_at',{ascending:false});
  const map = new Map();
  data?.forEach(m=>{
    if(!map.has(m.channel)){
      const sid = m.channel.split(':').find(x=>x.startsWith('student_'));
      if(sid) map.set(sid, {id:sid, name:sid.replace('student_',''), last:m.text});
    }
  });
  students.innerHTML = '';
  [...map.values()].forEach(s=>{
    const b = document.createElement('button');
    b.className = 'w-full p-3 rounded-xl hover:bg-white/5 flex items-center gap-3 text-right transition';
    b.innerHTML = `<div class="w-10 h-10 rounded-lg bg-violet-700 grid place-items-center text-sm font-bold">${s.name[0]}</div><div class="flex-1 min-w-0"><div class="truncate text-sm">${s.name}</div><div class="text-xs text-zinc-500 truncate">${s.last||''}</div></div>`;
    b.onclick = ()=> openChat(s);
    students.appendChild(b);
  });
}

// 3- فتح محادثة
async function openChat(s){
  active = s.id;
  empty.classList.add('hidden');
  chatHead.classList.remove('hidden');
  msgsWrap.classList.remove('hidden');
  inputWrap.classList.remove('hidden');
  studentName.textContent = s.name;
  avatar.textContent = s.name[0];

  const ch = `chat:${[ME,s.id].sort().join(':')}`;
  const {data} = await supa.from('messages').select('*').eq('channel',ch).order('created_at');
  msgs.innerHTML = '';
  data?.forEach(m=> addMsg(m));
  msgsWrap.scrollTop = msgsWrap.scrollHeight;

  // علم كمقروء
  await supa.from('messages').update({status:'read'}).eq('channel',ch).neq('from_id',ME);
}

// 4- إضافة رسالة مع hover delete
function addMsg(m){
  const me = m.from_id === ME;
  const div = document.createElement('div');
  div.className = 'msg-enter flex '+(me?'justify-end':'justify-start')+' group';
  div.dataset.id = m.id;
  const time = new Date(m.created_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const tick = me? (m.status==='read'?'✓✓':m.status==='delivered'?'✓✓':'✓') : '';
  div.innerHTML = `<div class="relative max-w-[70%]">
    <div class="${me?'bg-violet-600':'bg-slate-800'} px-4 py-2 rounded-2xl text-[14px] leading-relaxed">${m.text}</div>
    <div class="text-[11px] text-zinc-500 mt-1 ${me?'text-left':'text-right'}">${time} ${tick}</div>
    <button onclick="delMsg('${m.id}')" class="absolute ${me?'-left-8':'-right-8'} top-1 w-6 h-6 grid place-items-center bg-red-900/80 rounded opacity-0 group-hover:opacity-100 transition text-red-300">×</button>
  </div>`;
  msgs.appendChild(div);
}
window.delMsg = async id => { if(confirm('حذف الرسالة؟')) await supa.from('messages').delete().eq('id',id); };

// 5- إرسال فوري (Optimistic UI)
form.onsubmit = async e => {
  e.preventDefault();
  const txt = input.value.trim();
  if(!txt ||!active) return;

  input.value = '';
  input.style.height = 'auto';
  form.querySelector('button').disabled = true;

  // ارسم فوراً
  const temp = {id:'tmp', from_id:ME, text:txt, created_at:new Date().toISOString(), status:'sent'};
  addMsg(temp);
  msgsWrap.scrollTop = msgsWrap.scrollHeight;

  const ch = `chat:${[ME,active].sort().join(':')}`;
  const {data} = await supa.from('messages').insert({channel:ch, from_id:ME, text:txt, status:'sent'}).select().single();

  document.querySelector('[data-id="tmp"]')?.remove();
  if(data) addMsg(data);

  form.querySelector('button').disabled = false;
  input.focus();
  loadStudents();
};

// Enter للإرسال
input.addEventListener('input', ()=>{
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 128) + 'px';
  form.querySelector('button').disabled =!input.value.trim();
});
input.addEventListener('keydown', e=>{
  if(e.key==='Enter' &&!e.shiftKey){ e.preventDefault(); form.requestSubmit(); }
});

// مسح المحادثة
clearBtn.onclick = async ()=>{
  if(!active ||!confirm('مسح كل الرسائل؟')) return;
  const ch = `chat:${[ME,active].sort().join(':')}`;
  await supa.from('messages').delete().eq('channel',ch);
  msgs.innerHTML = '';
  loadStudents();
};

// Realtime
supa.channel('teacher')
 .on('postgres_changes',{event:'INSERT',table:'messages'},p=>{
    const m = p.new;
    if(!m.channel.includes(ME)) return;
    const sid = m.channel.split(':').find(x=>x.startsWith('student_'));
    if(sid===active && m.from_id!==ME){
      addMsg(m);
      msgsWrap.scrollTop = msgsWrap.scrollHeight;
      supa.from('messages').update({status:'delivered'}).eq('id',m.id);
    }
    loadStudents();
  })
 .on('postgres_changes',{event:'UPDATE',table:'messages'},p=>{
    const el = document.querySelector(`[data-id="${p.new.id}"]`);
    if(el){ el.remove(); addMsg(p.new); }
  })
 .on('postgres_changes',{event:'DELETE',table:'messages'},p=>{
    document.querySelector(`[data-id="${p.old.id}"]`)?.remove();
  })
 .subscribe();

loadStudents();
const students=document.getElementById('students'), msgs=document.getElementById('msgs'), msgsWrap=document.getElementById('msgsWrap'), input=document.getElementById('input'), form=document.getElementById('form'), empty=document.getElementById('empty'), chatHead=document.getElementById('chatHead'), inputWrap=document.getElementById('inputWrap'), avatar=document.getElementById('avatar'), studentName=document.getElementById('studentName'), clearBtn=document.getElementById('clearBtn'), clock=document.getElementById('clock'), search=document.getElementById('search');
search.oninput = ()=> loadStudents();
</script>
</body>
</html>
