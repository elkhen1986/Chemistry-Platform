<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>لوحة تحكم المعلم - أ. عبدالحميد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font-family:'Cairo',system-ui,-apple-system,Segoe UI,Roboto; 
    color:#ede9ff; background:#070514;
    background: radial-gradient(1200px 800px at 90% -20%, rgba(124,58,237,.28), transparent 60%),
                radial-gradient(900px 600px at -10% 120%, rgba(168,85,247,.18), transparent 50%),
                #070514;
  }
  :root{
    --p1:#7c3aed; --p2:#a855f7; --p3:#4c1d95;
    --glass:rgba(255,255,255,.06); --border:rgba(255,255,255,.09);
  }
  .app{display:grid; grid-template-columns:360px 1fr; height:100vh}
  .sidebar{
    backdrop-filter:blur(16px);
    background:linear-gradient(180deg, rgba(20,10,50,.75), rgba(10,5,30,.65));
    border-left:1px solid var(--border); padding:22px; display:flex; flex-direction:column; gap:16px
  }
  .brand{display:flex; align-items:center; gap:12px}
  .logo{width:46px; height:46px; border-radius:14px; background:linear-gradient(135deg,var(--p1),var(--p2)); display:grid; place-items:center; font-weight:800; font-size:20px; box-shadow:0 12px 30px rgba(124,58,237,.35), inset 0 1px 0 rgba(255,255,255,.2)}
  .brand .title{font-weight:800; font-size:18px; line-height:1}
  .brand .sub{font-size:12px; opacity:.75}
  .search{position:relative}
  .search input{
    width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--border);
    background:rgba(255,255,255,.055); color:#fff; outline:none; font-family:'Cairo'
  }
  .search input::placeholder{color:#a79dc7}
  .students{display:flex; flex-direction:column; gap:10px; overflow:auto; padding-left:4px; margin-top:4px; scrollbar-width:thin}
  .student{
    position:relative; padding:14px; border-radius:16px; 
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    border:1px solid var(--border); cursor:pointer; transition:.18s; display:flex; align-items:center; gap:12px
  }
  .student:hover{transform:translateX(-3px); background:rgba(124,58,237,.18); border-color:rgba(167,85,247,.35)}
  .student.active{background:linear-gradient(135deg, rgba(124,58,237,.38), rgba(168,85,247,.26)); border-color:rgba(168,85,247,.6); box-shadow:0 10px 24px rgba(124,58,237,.22) inset, 0 8px 20px rgba(0,0,0,.25)}
  .avatar{width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,#2a1a5e,#3b237a); display:grid; place-items:center; font-weight:800; color:#d8ccff; border:1px solid rgba(255,255,255,.08)}
  .name{font-weight:700}
  .sub2{font-size:12px; opacity:.7}
  .main{display:grid; grid-template-rows:auto 1fr auto; height:100vh; min-width:0}
  .header{
    height:70px; display:flex; align-items:center; gap:12px; justify-content:space-between; padding:0 18px;
    background:rgba(15,8,40,.6); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:5
  }
  .header .left{display:flex; align-items:center; gap:10px}
  .menu{display:none; background:transparent; border:1px solid var(--border); color:#fff; padding:8px 12px; border-radius:10px; cursor:pointer}
  #chatTitle{font-weight:800; font-size:18px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .status{font-size:12px; padding:6px 10px; border-radius:999px; background:rgba(34,197,94,.15); color:#86efac; border:1px solid rgba(34,197,94,.3)}
  .chat{
    padding:26px; overflow:auto; min-height:0;
    background-image: radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:22px 22px;
  }
  .hint{opacity:.7; text-align:center; margin-top:20vh}
  .msg{max-width:74%; padding:12px 14px; border-radius:18px; margin:10px 0; line-height:1.9; position:relative; word-wrap:break-word; box-shadow:0 10px 24px rgba(0,0,0,.18); animation:pop .18s ease-out}
  @keyframes pop{from{opacity:0; transform:translateY(4px) scale(.98)} to{opacity:1; transform:none}}
  .msg.me{margin-right:auto; background:linear-gradient(135deg, var(--p1), var(--p2)); border:1px solid rgba(255,255,255,.18)}
  .msg.other{margin-left:auto; background:rgba(255,255,255,.07); border:1px solid var(--border); backdrop-filter:blur(4px)}
  .msg .time{display:block; margin-top:6px; font-size:11px; opacity:.75}
  .inputbar{display:flex; gap:10px; padding:14px; background:linear-gradient(180deg, rgba(10,5,30,.4), rgba(10,5,30,.85)); border-top:1px solid var(--border)}
  .inputbar input{flex:1; padding:14px 16px; border-radius:14px; border:1px solid var(--border); background:rgba(255,255,255,.06); color:#fff; font-family:'Cairo'; font-size:15px; outline:none; transition:.15s}
  .inputbar input:focus{border-color:rgba(168,85,247,.6); background:rgba(255,255,255,.09); box-shadow:0 0 0 3px rgba(124,58,237,.22)}
  .inputbar button{padding:0 22px; height:50px; border-radius:14px; border:none; background:linear-gradient(135deg,var(--p1),var(--p2)); color:white; font-weight:800; cursor:pointer; box-shadow:0 12px 24px rgba(124,58,237,.35), inset 0 1px 0 rgba(255,255,255,.2); transition:.1s}
  .inputbar button:active{transform:translateY(1px)}
  .inputbar button:disabled{opacity:.5; cursor:not-allowed; filter:grayscale(.15)}
  .error{background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.35); color:#fecaca; padding:12px; border-radius:12px; text-align:center}
  .loading{opacity:.8; text-align:center; padding:16px; color:#c4b5fd}
  @media (max-width:980px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed; right:0; top:0; bottom:0; width:88%; max-width:380px; transform:translateX(110%); transition:transform .25s ease; z-index:40; box-shadow:-20px 0 40px rgba(0,0,0,.45)}
    .sidebar.open{transform:none}
    .menu{display:inline-flex}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">ع</div>
      <div>
        <div class="title">لوحة تحكم المعلم</div>
        <div class="sub">الأستاذ عبدالحميد</div>
      </div>
    </div>
    <div class="search">
      <input id="search" placeholder="ابحث عن طالب..." />
    </div>
    <div class="students" id="students">
      <div class="loading">جاري تحميل الطلاب...</div>
    </div>
  </aside>

  <section class="main">
    <header class="header">
      <div class="left">
        <button class="menu" id="menuBtn">☰</button>
        <div id="chatTitle">اختر طالبًا لبدء المحادثة</div>
      </div>
      <div class="status">متصل ✓</div>
    </header>

    <div class="chat" id="chat">
      <div class="hint">مرحبًا أستاذ عبدالحميد 👋<br>اختر طالبًا من القائمة لعرض المحادثة.</div>
    </div>

    <div class="inputbar">
      <input id="msgInput" placeholder="اكتب رسالتك للطالب..." disabled />
      <button id="sendBtn" disabled>إرسال</button>
    </div>
  </section>
</div>

<script>
const SUPABASE_URL = 'https://igedjuwdwyoydiyhsfyb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZWRqdXdkd3lveWRpeWhzZnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTM0OTIsImV4cCI6MjA5MzQyOTQ5Mn0.8otVjvVT5NWx6whBvA_15ke48p6N9fUWMQE7MTnCrYg';
const teacherId = 'teacher_abdulhamid';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const studentsEl = document.getElementById('students');
const chatEl = document.getElementById('chat');
const chatTitle = document.getElementById('chatTitle');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const searchInput = document.getElementById('search');

let currentStudent = null;
let currentChannel = null;
let currentChannelName = null;

function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function safeIdFor(studentId){
  return 'stu-' + btoa(unescape(encodeURIComponent(studentId))).replace(/=/g,'');
}

function fmtTime(ts){
  try{ return new Date(ts).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}); }catch{ return '' }
}

async function loadStudents(){
  try{
    studentsEl.innerHTML = '<div class="loading">جاري التحميل...</div>';
    const { data, error } = await supabase.from('messages')
      .select('from_id,created_at')
      .order('created_at',{ascending:false})
      .limit(500);
    if(error) throw error;
    const ids = [...new Set((data||[]).map(m=>m.from_id).filter(id=>id && id.startsWith('student_')))];
    const list = ids.length ? ids : ['student_عبدالحميد','student_أحمد'];
    studentsEl.innerHTML = '';
    list.forEach(s=>{
      const safeId = safeIdFor(s);
      const div = document.createElement('div');
      div.className = 'student';
      div.id = safeId;
      const shortName = s.replace('student_','');
      const initials = shortName.slice(0,2);
      div.innerHTML = `<div class="avatar">${escapeHtml(initials)}</div><div><div class="name">${escapeHtml(shortName)}</div><div class="sub2">طالب</div></div>`;
      div.onclick = ()=>{ openChat(s); sidebar.classList.remove('open'); };
      studentsEl.appendChild(div);
    });
  }catch(e){
    console.error(e);
    studentsEl.innerHTML = `<div class="error">تعذر تحميل قائمة الطلاب. تحقق من الاتصال بقاعدة البيانات وحاول مرة أخرى.</div>`;
  }
}

async function openChat(studentId){
  currentStudent = studentId;
  const safeId = 'stu-' + btoa(unescape(encodeURIComponent(studentId))).replace(/=/g,'');
  document.querySelectorAll('.student').forEach(el=>el.classList.remove('active'));
  const activeEl = document.getElementById(safeId);
  if(activeEl) activeEl.classList.add('active');

  const displayName = studentId.replace('student_','');
  chatTitle.textContent = `محادثة مع ${displayName}`;
  msgInput.disabled = false;
  sendBtn.disabled = false;
  msgInput.focus();
  await loadMessages(studentId);
  subscribe(studentId);
}

async function loadMessages(studentId){
  chatEl.innerHTML = '<div class="loading">جاري تحميل الرسائل...</div>';
  currentChannelName = `chat_${[studentId, teacherId].sort().join('_')}`;
  try{
    const { data, error } = await supabase.from('messages')
      .select('*')
      .eq('channel', currentChannelName)
      .order('created_at',{ascending:true})
      .limit(300);
    if(error) throw error;
    chatEl.innerHTML = '';
    if(!data || data.length===0){
      chatEl.innerHTML = `<div class="hint">لا توجد رسائل بعد. ابدأ المحادثة مع ${escapeHtml(studentId.replace('student_',''))}.</div>`;
      return;
    }
    data.forEach(m=>addMessage(m, false));
    chatEl.scrollTop = chatEl.scrollHeight;
  }catch(e){
    console.error(e);
    chatEl.innerHTML = `<div class="error">حدث خطأ أثناء تحميل الرسائل.</div>`;
  }
}

function addMessage(m, scroll=true){
  if(m.channel !== currentChannelName) return;
  const isMe = m.from_id === teacherId;
  const div = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'me' : 'other');
  div.innerHTML = `${escapeHtml(m.text)}<span class="time">${fmtTime(m.created_at)}</span>`;
  if(chatEl.querySelector('.hint')) chatEl.innerHTML = '';
  chatEl.appendChild(div);
  if(scroll) chatEl.scrollTop = chatEl.scrollHeight;
}

function subscribe(studentId){
  if(currentChannel){ supabase.removeChannel(currentChannel); currentChannel = null; }
  currentChannelName = `chat_${[studentId, teacherId].sort().join('_')}`;
  currentChannel = supabase.channel('realtime-'+currentChannelName)
    .on('postgres_changes',{event:'INSERT', schema:'public', table:'messages', filter:`channel=eq.${currentChannelName}`}, payload=>{
      addMessage(payload.new, true);
    }).subscribe();
}

async function sendMessage(){
  const text = msgInput.value.trim();
  if(!text || !currentStudent) return;
  const channel = `chat_${[currentStudent, teacherId].sort().join('_')}`;
  sendBtn.disabled = true;
  try{
    const { error } = await supabase.from('messages').insert({ channel, from_id: teacherId, text: text });
    if(error) throw error;
    msgInput.value = '';
  }catch(e){
    alert('فشل إرسال الرسالة: ' + (e.message || 'خطأ غير معروف'));
  }finally{
    sendBtn.disabled = false;
    msgInput.focus();
  }
}

sendBtn.onclick = sendMessage;
msgInput.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }});
menuBtn.onclick = ()=> sidebar.classList.toggle('open');
searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.trim();
  document.querySelectorAll('.student').forEach(el=>{
    const name = el.querySelector('.name')?.textContent || '';
    el.style.display = name.includes(q) ? 'flex' : 'none';
  });
});

// init
loadStudents();
</script>
</body>
</html>
