<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة المعلم - Dark Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>tailwind.config={darkMode:'class'}</script>
<style>
  *{font-family:'Cairo',sans-serif}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#4c1d95;border-radius:3px}
  body{background:#050816;color:#e5e7eb}
 .glass{background:rgba(17,24,39,.7);backdrop-filter:blur(12px);border:1px solid rgba(139,92,246,.15)}
</style>
</head>
<body class="h-screen overflow-hidden flex flex-col">
<!-- Header -->
<header class="h-[70px] glass sticky top-0 z-40 px-5 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-violet-600 to-indigo-600 grid place-items-center font-extrabold text-white shadow-lg shadow-violet-900/40">ع</div>
    <div>
      <h1 class="font-extrabold text-[18px] leading-tight">لوحة تحكم الأستاذ عبدالحميد</h1>
      <div class="flex items-center gap-2 text-xs text-emerald-400"><span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>نظام مباشر</div>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <div id="liveClock" class="bg-[#0f172a] border border-violet-900/30 px-4 py-2 rounded-xl font-mono text-violet-300 text-sm tracking-wider shadow-inner">--:--:--</div>
    <div class="w-8 h-8 rounded-full bg-[#1e293b] grid place-items-center text-violet-400">🔔</div>
  </div>
</header>

<div class="flex-1 flex overflow-hidden">
  <!-- Sidebar -->
  <aside class="w-[360px] glass m-3 ml-0 rounded-2xl flex flex-col overflow-hidden">
    <div class="p-4 border-b border-white/5">
      <div class="relative">
        <input id="search" placeholder="بحث عن طالب..." class="w-full h-11 bg-[#0b1220] border border-white/10 rounded-xl pr-10 pl-3 text-sm outline-none focus:border-violet-500/50 text-gray-200">
        <svg class="w-4 h-4 absolute right-3 top-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
    <div class="px-4 py-2 text-[11px] text-gray-500 uppercase tracking-wider">المحادثات النشطة</div>
    <div id="students" class="flex-1 overflow-y-auto px-2 pb-3 space-y-1"></div>
  </aside>

  <!-- Chat -->
  <main class="flex-1 flex flex-col m-3 mr-0">
    <div id="empty" class="flex-1 glass rounded-2xl grid place-items-center">
      <div class="text-center">
        <div class="w-24 h-24 mx-auto mb-4 rounded-3xl bg-gradient-to-br from-violet-900/40 to-indigo-900/40 grid place-items-center border border-violet-800/30"><svg class="w-12 h-12 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg></div>
        <h3 class="text-xl font-bold mb-1">مرحباً أستاذ عبدالحميد</h3>
        <p class="text-gray-500 text-sm">اختر طالب من القائمة لبدء المحادثة</p>
      </div>
    </div>

    <div id="chatBox" class="hidden flex-1 flex flex-col glass rounded-2xl overflow-hidden">
      <!-- Chat Head -->
      <div class="h-[64px] border-b border-white/5 px-4 flex items-center justify-between bg-[#0b1220]/80">
        <div class="flex items-center gap-3">
          <div id="avatar" class="w-10 h-10 rounded-xl bg-violet-900/50 grid place-items-center font-bold text-violet-300 border border-violet-800/40"></div>
          <div>
            <div id="sName" class="font-bold"></div>
            <div id="sStatus" class="text-xs text-gray-400 flex items-center gap-1.5"></div>
          </div>
        </div>
        <button id="clearChat" class="text-xs text-red-400 hover:text-red-300 px-3 py-1.5 rounded-lg hover:bg-red-950/40 border border-red-900/30">مسح المحادثة</button>
      </div>
      <!-- Messages -->
      <div id="msgs" class="flex-1 overflow-y-auto p-5 space-y-3 bg-[radial-gradient(ellipse_at_top,_rgba(139,92,246,0.08),transparent_60%)]"></div>
      <!-- Input -->
      <form id="sendForm" class="p-4 border-t border-white/5 bg-[#0b1220]/60">
        <div class="flex items-center gap-2 max-w-4xl mx-auto">
          <input id="msgInput" class="flex-1 h-[48px] bg-[#050816] border border-white/10 rounded-2xl px-4 text-[15px] outline-none focus:border-violet-500/50 placeholder-gray-500" placeholder="اكتب رسالتك..." autocomplete="off">
          <button class="h-[48px] px-6 bg-gradient-to-r from-violet-600 to-indigo-600 rounded-2xl font-bold shadow-lg shadow-violet-900/30 hover:opacity-90 active:scale-95 transition">إرسال</button>
        </div>
      </form>
    </div>
  </main>
</div>

<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supa=createClient('https://igedjuwdwyoydiyhsfyb.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZWRqdXdkd3lveWRpeWhzZnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTM0OTIsImV4cCI6MjA5MzQyOTQ5Mn0.8otVjvVT5NWx6whBvA_15ke48p6N9fUWMQE7MTnCrYg');
const TEACHER='teacher_abdulhamid';
let currentChannel=null, currentStudent=null;

// ساعة حية 100% مع الجهاز
function updateClock(){ const now=new Date(); liveClock.textContent=now.toLocaleTimeString('ar-EG',{hour12:false}); }
setInterval(updateClock,1000); updateClock();

const studentsEl=document.getElementById('students');
const msgsEl=document.getElementById('msgs');

function chFor(s){return `chat:${[TEACHER,s].sort().join(':')}`}

async function loadStudents(){
  const {data}=await supa.from('messages').select('channel,from_id,text,created_at,status').ilike('channel',`%${TEACHER}%`).order('created_at',{ascending:false}).limit(300);
  const map={}; data?.forEach(m=>{ const s=m.channel.split(':').find(p=>p.startsWith('student_')); if(s &&!map[s]) map[s]=m; });
  studentsEl.innerHTML='';
  for(const sid of Object.keys(map)){
    const m=map[sid];
    const {data:pres}=await supa.from('user_presence').select('*').eq('user_id',sid).maybeSingle();
    const online=pres?.is_online && (Date.now()-new Date(pres.last_seen).getTime()<12000);
    const name=sid.replace('student_','');
    const el=document.createElement('div');
    el.className='group p-3 rounded-xl hover:bg-white/5 cursor-pointer border border-transparent hover:border-violet-900/30 transition';
    el.innerHTML=`<div class="flex items-center gap-3"><div class="relative"><div class="w-11 h-11 rounded-xl bg-[#1e293b] grid place-items-center font-bold text-violet-300 border border-white/5">${name.slice(0,2)}</div>${online?'<span class="absolute -bottom-1 -right-1 w-3 h-3 bg-emerald-500 rounded-full border-2 border-[#0b1220]"></span>':''}</div><div class="flex-1 min-w-0"><div class="flex justify-between items-baseline"><span class="font-semibold text-[14px] truncate">${name}</span><span class="text-[11px] text-gray-500">${new Date(m.created_at).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</span></div><div class="text-xs text-gray-400 truncate mt-0.5">${m.text||''}</div></div></div>`;
    el.onclick=()=>openChat(sid);
    studentsEl.appendChild(el);
  }
}

async function openChat(sid){
  currentStudent=sid; currentChannel=chFor(sid);
  document.getElementById('empty').classList.add('hidden');
  document.getElementById('chatBox').classList.remove('hidden');
  document.getElementById('sName').textContent=sid.replace('student_','');
  document.getElementById('avatar').textContent=sid.replace('student_','').slice(0,2);
  updatePresence(); loadMessages(); markRead();
}

async function updatePresence(){
  const {data}=await supa.from('user_presence').select('*').eq('user_id',currentStudent).maybeSingle();
  const on=data?.is_online && (Date.now()-new Date(data.last_seen).getTime()<12000);
  sStatus.innerHTML=on?'<span class="w-2 h-2 bg-emerald-500 rounded-full"></span> متصل الآن':'<span class="w-2 h-2 bg-gray-600 rounded-full"></span> غير متصل';
}

async function loadMessages(){
  const {data}=await supa.from('messages').select('*').eq('channel',currentChannel).order('created_at');
  msgsEl.innerHTML=''; data?.forEach(renderMsg); msgsEl.scrollTop=msgsEl.scrollHeight;
}

function renderMsg(m){
  const me=m.from_id===TEACHER;
  const div=document.createElement('div'); div.className='flex '+(me?'justify-start':'justify-end');
  let checks=''; if(me){ if(m.status==='read') checks='<span class="text-sky-400">✓✓</span>'; else if(m.status==='delivered') checks='<span class="text-gray-400">✓✓</span>'; else checks='<span class="text-gray-500">✓</span>'; }
  div.innerHTML=`<div class="max-w-[72%] group relative"><div class="${me?'bg-gradient-to-r from-violet-600 to-indigo-600 text-white':'bg-[#1e293b] border border-white/5 text-gray-100'} px-4 py-2.5 rounded-2xl ${me?'rounded-br-md':'rounded-bl-md'} shadow-lg shadow-black/20"><div class="leading-[1.6] whitespace-pre-wrap break-words text-[14px]">${m.text||''}</div><div class="flex items-center gap-1.5 mt-1.5 justify-end"><span class="text-[10px] opacity-60">${new Date(m.created_at).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</span>${checks}</div></div><button onclick="delMsg('${m.id}')" class="absolute -top-2 -left-2 w-6 h-6 bg-red-600 rounded-full text-xs opacity-0 group-hover:opacity-100 transition grid place-items-center">×</button></div>`;
  msgsEl.appendChild(div);
}

async function markRead(){ await supa.from('messages').update({status:'read',read_at:new Date().toISOString()}).eq('channel',currentChannel).neq('from_id',TEACHER); }

document.getElementById('sendForm').onsubmit=async e=>{ e.preventDefault(); const t=msgInput.value.trim(); if(!t||!currentChannel) return; msgInput.value=''; await supa.from('messages').insert({channel:currentChannel,from_id:TEACHER,text:t,status:'sent'}); };

window.delMsg=async id=>{ if(confirm('حذف الرسالة نهائياً؟')){ await supa.from('messages').delete().eq('id',id); loadMessages(); } };
clearChat.onclick=async()=>{ if(confirm('مسح كل المحادثة؟')){ await supa.from('messages').delete().eq('channel',currentChannel); msgsEl.innerHTML=''; } };

// Realtime
supa.channel('rt').on('postgres_changes',{event:'*',schema:'public',table:'messages'},p=>{ if(p.new?.channel===currentChannel) loadMessages(); loadStudents(); }).on('postgres_changes',{event:'*',schema:'public',table:'user_presence'},()=>{ updatePresence(); loadStudents(); }).subscribe();

loadStudents(); setInterval(()=>{loadStudents(); if(currentStudent) updatePresence()},4000);
</script>
</body>
</html>
