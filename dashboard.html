<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المعلم - عبدالحميد</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Cairo', sans-serif; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="bg-[#f8fafc] text-gray-800 antialiased">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 py-3.5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-blue-600/20">
          ع
        </div>
        <div>
          <h1 class="text-[20px] sm:text-[22px] font-bold text-gray-900 leading-tight">لوحة المعلم - عبدالحميد</h1>
          <div class="flex items-center gap-2 mt-0.5">
            <span id="status-dot" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
            <p id="status" class="text-xs text-gray-500">جاري الاتصال بـ Supabase...</p>
          </div>
        </div>
      </div>
      <div class="hidden md:flex items-center gap-3 text-xs text-gray-500">
        <div class="flex items-center gap-1.5 bg-gray-50 px-3 py-1.5 rounded-full border">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>تحديث كل 5 ثوانٍ</span>
        </div>
      </div>
    </div>
  </header>

  <div class="max-w-[1400px] mx-auto h-[calc(100vh-73px)]">
    <div class="flex flex-col lg:flex-row h-full gap-0 lg:gap-4 lg:p-4">
      
      <!-- Chat Area - يظهر على اليمين في RTL -->
      <main class="flex-1 order-2 lg:order-1 bg-white lg:rounded-[20px] shadow-sm border border-gray-200 flex flex-col overflow-hidden min-h-0">
        <!-- Chat Header -->
        <div class="bg-gradient-to-l from-gray-50 to-white border-b border-gray-200 px-4 sm:px-5 py-3.5 flex items-center justify-between shrink-0">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center text-gray-600">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div>
              <h3 id="current-student" class="font-bold text-gray-900">اختر محادثة</h3>
              <p id="current-channel" class="text-[12px] text-gray-500 -mt-0.5">لا توجد قناة محددة</p>
            </div>
          <div class="text-[11px] text-gray-400" id="msg-count">0 رسالة</div>
        </div>

        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto px-3 sm:px-5 py-5 bg-[radial-gradient(circle_at_top_right,#f8fafc,transparent_50%),radial-gradient(circle_at_bottom_left,#f1f5f9,transparent_50%),#fcfdff] min-h-[300px]">
          <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center p-8">
            <div class="w-20 h-20 rounded-2xl bg-blue-50 flex items-center justify-center mb-4">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5"><path d="M21 11.5a8.38 0 0 1-.9 3.8 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            </div>
            <h4 class="font-bold text-gray-800 mb-1">مرحباً أستاذ عبدالحميد</h4>
            <p class="text-sm text-gray-500 max-w-xs">اختر طالباً من القائمة لعرض المحادثة والرد على رسائله</p>
          </div>
        </div>

        <!-- Input -->
        <form id="send-form" class="border-t border-gray-200 bg-white p-3 sm:p-4 shrink-0">
          <div class="flex items-end gap-2 sm:gap-3">
            <div class="flex-1 relative">
              <input 
                id="message-input" 
                type="text" 
                placeholder="اكتب ردك هنا..." 
                disabled
                class="w-full bg-gray-50 border border-gray-300 rounded-2xl px-4 py-3 text-[15px] leading-6 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition disabled:opacity-50 disabled:cursor-not-allowed placeholder:text-gray-400"
                autocomplete="off"
              >
            </div>
            <button 
              type="submit" 
              id="send-btn"
              disabled
              class="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white rounded-2xl px-5 sm:px-6 py-3 font-semibold text-[15px] transition shadow-sm shadow-blue-600/20 hover:shadow-md hover:shadow-blue-600/30 active:scale-[0.98] flex items-center gap-1.5 shrink-0"
            >
              <span>إرسال</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="rotate-180"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </form>
      </main>

      <!-- Students Sidebar - يظهر على اليسار في RTL -->
      <aside class="w-full lg:w-[340px] xl:w-[380px] order-1 lg:order-2 bg-white lg:rounded-[20px] shadow-sm border border-gray-200 flex flex-col overflow-hidden max-h-[38vh] lg:max-h-none lg:h-full shrink-0">
        <div class="px-4 py-3.5 border-b border-gray-200 bg-gray-50/70">
          <div class="flex items-center justify-between">
            <h2 class="font-bold text-gray-800 flex items-center gap-2">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              الطلاب
            </h2>
            <span id="students-count" class="text-xs bg-white border px-2 py-0.5 rounded-full text-gray-600">0</span>
          </div>
        <div id="student-list" class="flex-1 overflow-y-auto divide-y divide-gray-100">
          <div class="p-8 text-center text-gray-400 text-sm">جاري تحميل المحادثات...</div>
        </div>
      </aside>

    </div>
  </div>

  <!-- Error Console -->
  <div id="error-log" class="fixed bottom-0 inset-x-0 bg-[#0f172a]/95 backdrop-blur text-amber-300 text-[11px] font-mono leading-relaxed max-h-28 overflow-auto border-t border-amber-500/20 hidden z-50 direction-ltr text-left">
    <div class="sticky top-0 bg-[#0f172a] px-3 py-1.5 border-b border-white/10 flex justify-between items-center">
      <span class="text-amber-400 font-bold">Console Errors</span>
      <button onclick="document.getElementById('error-log').classList.add('hidden')" class="text-white/60 hover:text-white">✕</button>
    </div>
    <div id="error-content" class="p-2 space-y-1"></div>
  </div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://igedjuwdwyoydiyhsfyb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZWRqdXdkd3lveWRpeWhzZnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTM0OTIsImV4cCI6MjA5MzQyOTQ5Mn0.8otVjvVT5NWx6whBvA_15ke48p6N9fUWMQE7MTnCrYg';
const TEACHER_ID = 'teacher_abdulhamid';

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const errorLog = document.getElementById('error-log');
const errorContent = document.getElementById('error-content');
function showError(...args) {
  errorLog.classList.remove('hidden');
  const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ');
  const time = new Date().toLocaleTimeString('en-GB');
  const line = document.createElement('div');
  line.textContent = `[${time}] ${msg}`;
  errorContent.appendChild(line);
  errorContent.scrollTop = errorContent.scrollHeight;
}
const origError = console.error;
console.error = (...args) => { origError(...args); showError(...args); };
window.addEventListener('error', e => showError('Error:', e.message));
window.addEventListener('unhandledrejection', e => showError('Promise:', e.reason?.message || e.reason));

let allMessages = [];
let selectedChannel = null;
let refreshInterval = null;

const statusEl = document.getElementById('status');
const statusDot = document.getElementById('status-dot');
const studentList = document.getElementById('student-list');
const messagesEl = document.getElementById('messages');
const currentStudentEl = document.getElementById('current-student');
const currentChannelEl = document.getElementById('current-channel');
const msgCountEl = document.getElementById('msg-count');
const studentsCountEl = document.getElementById('students-count');
const messageInput = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');
const emptyState = document.getElementById('empty-state');

function formatTime(iso) {
  try { return new Date(iso).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }); }
  catch { return ''; }
}

function formatDate(iso) {
  try { 
    const d = new Date(iso);
    const today = new Date();
    const isToday = d.toDateString() === today.toDateString();
    if (isToday) return formatTime(iso);
    return d.toLocaleDateString('ar-EG', { month: 'short', day: 'numeric' });
  } catch { return ''; }
}

function extractStudentName(channel) {
  let name = channel.replace(/teacher_abdulhamid/gi, '').replace(/[_-]+/g, ' ').trim();
  name = name.replace(/\b(channel|chat|private)\b/gi, '').trim();
  if (!name || name.length < 2) {
    return channel.length > 20 ? channel.slice(0, 20) + '…' : channel;
  }
  const parts = name.split(' ').filter(Boolean);
  const clean = parts.map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' ');
  return clean || 'طالب';
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadMessages(isInitial = false) {
  try {
    const { data, error } = await supabase
      .from('messages')
      .select('*')
      .ilike('channel', `%${TEACHER_ID}%`)
      .order('created_at', { ascending: false })
      .limit(50);

    if (error) throw error;

    allMessages = (data || []).reverse();
    
    statusEl.textContent = 'متصل الآن';
    statusEl.className = 'text-xs text-green-600';
    statusDot.className = 'w-2 h-2 rounded-full bg-green-500';
    statusDot.classList.remove('animate-pulse');

    renderStudents();

    if (selectedChannel) {
      renderChat();
    } else if (isInitial && allMessages.length > 0) {
      const firstChannel = [...new Set(allMessages.map(m => m.channel))][0];
      if (firstChannel) selectChannel(firstChannel);
    }

    if (allMessages.length === 0 && isInitial) {
      studentList.innerHTML = `<div class="p-8 text-center text-gray-500 text-sm">لا توجد محادثات بعد</div>`;
    }

  } catch (err) {
    console.error('تحميل الرسائل:', err.message);
    statusEl.textContent = 'خطأ في الاتصال';
    statusEl.className = 'text-xs text-red-600';
    statusDot.className = 'w-2 h-2 rounded-full bg-red-500';
  }
}

function renderStudents() {
  const channels = [...new Set(allMessages.map(m => m.channel))];
  studentsCountEl.textContent = channels.length;

  if (channels.length === 0) {
    studentList.innerHTML = `<div class="p-8 text-center text-gray-400 text-sm">لا توجد محادثات</div>`;
    return;
  }

  studentList.innerHTML = '';
  
  channels.forEach(channel => {
    const msgs = allMessages.filter(m => m.channel === channel);
    const lastMsg = msgs[msgs.length - 1];
    const studentName = extractStudentName(channel);
    const unread = msgs.filter(m => m.sender_id !== TEACHER_ID).length;
    
    const btn = document.createElement('button');
    btn.className = `w-full text-right p-3.5 hover:bg-gray-50 transition group relative ${channel === selectedChannel ? 'bg-blue-50/70' : ''}`;
    btn.innerHTML = `
      <div class="flex items-start gap-3">
        <div class="w-10 h-10 rounded-xl ${channel === selectedChannel ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 group-hover:bg-gray-200'} flex items-center justify-center font-bold text-[15px] shrink-0 transition">
          ${studentName.charAt(0)}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-baseline justify-between gap-2">
            <h4 class="font-semibold text-[14px] text-gray-900 truncate">${studentName}</h4>
            <span class="text-[11px] text-gray-500 shrink-0">${lastMsg ? formatDate(lastMsg.created_at) : ''}</span>
          </div>
          <p class="text-[13px] text-gray-500 truncate mt-0.5 leading-snug">${lastMsg ? escapeHtml(lastMsg.content || '') : 'لا توجد رسائل'}</p>
          <p class="text-[10px] text-gray-400 mt-1 font-mono truncate" dir="ltr">${channel}</p>
        </div>
      </div>
      ${channel === selectedChannel ? '<div class="absolute right-0 top-0 bottom-0 w-[3px] bg-blue-600 rounded-l"></div>' : ''}
    `;
    btn.onclick = () => selectChannel(channel);
    studentList.appendChild(btn);
  });
}

function selectChannel(channel) {
  selectedChannel = channel;
  const studentName = extractStudentName(channel);
  
  currentStudentEl.textContent = studentName;
  currentChannelEl.textContent = channel;
  currentChannelEl.dir = 'ltr';
  
  messageInput.disabled = false;
  sendBtn.disabled = false;
  messageInput.focus();
  
  renderStudents();
  renderChat();
}

function renderChat() {
  if (!selectedChannel) return;
  
  const msgs = allMessages.filter(m => m.channel === selectedChannel);
  msgCountEl.textContent = `${msgs.length} رسالة`;
  
  if (msgs.length === 0) {
    messagesEl.innerHTML = `<div class="h-full flex items-center justify-center text-gray-400 text-sm">ابدأ المحادثة الآن</div>`;
    return;
  }

  emptyState?.remove();
  messagesEl.innerHTML = '';

  msgs.forEach((m, idx) => {
    const isTeacher = m.sender_id === TEACHER_ID;
    const prev = msgs[idx - 1];
    const showDate = !prev || new Date(m.created_at).toDateString() !== new Date(prev.created_at).toDateString();
    
    if (showDate) {
      const dateDiv = document.createElement('div');
      dateDiv.className = 'flex justify-center my-4';
      dateDiv.innerHTML = `<span class="text-[11px] bg-white border px-3 py-1 rounded-full text-gray-500 shadow-sm">${new Date(m.created_at).toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>`;
      messagesEl.appendChild(dateDiv);
    }

    const wrap = document.createElement('div');
    wrap.className = `flex ${isTeacher ? 'justify-start' : 'justify-end'} mb-2.5 fade-in`;
    
    wrap.innerHTML = `
      <div class="max-w-[78%] sm:max-w-[70%] group">
        <div class="flex items-end gap-2 ${isTeacher ? 'flex-row' : 'flex-row-reverse'}">
          <div class="w-7 h-7 rounded-full ${isTeacher ? 'bg-blue-600' : 'bg-gray-300'} flex items-center justify-center text-white text-[11px] font-bold shrink-0">
            ${isTeacher ? 'ع' : 'ط'}
          </div>
          <div class="${isTeacher ? 'bg-blue-600 text-white rounded-[18px] rounded-bl-[4px]' : 'bg-white text-gray-900 border border-gray-200 rounded-[18px] rounded-br-[4px]'} px-4 py-2.5 shadow-sm">
            <p class="text-[14px] leading-[1.6] whitespace-pre-wrap break-words">${escapeHtml(m.content || '')}</p>
          </div>
        <div class="flex ${isTeacher ? 'justify-start mr-9' : 'justify-end ml-9'} mt-1">
          <span class="text-[10px] text-gray-400 group-hover:text-gray-600 transition">${formatTime(m.created_at)}</span>
        </div>
      </div>
    `;
    messagesEl.appendChild(wrap);
  });

  messagesEl.scrollTop = messagesEl.scrollHeight;
}

document.getElementById('send-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = messageInput.value.trim();
  if (!text || !selectedChannel) return;

  const tempText = text;
  messageInput.value = '';
  messageInput.disabled = true;
  sendBtn.disabled = true;

  // Optimistic UI
  const optimisticMsg = {
    channel: selectedChannel,
    sender_id: TEACHER_ID,
    sender_role: 'teacher',
    content: tempText,
    created_at: new Date().toISOString(),
    id: 'temp-' + Date.now()
  };
  allMessages.push(optimisticMsg);
  renderChat();

  try {
    const { error } = await supabase
      .from('messages')
      .insert({
        channel: selectedChannel,
        sender_id: TEACHER_ID,
        sender_role: 'teacher',
        content: tempText
      });

    if (error) throw error;
    
    await loadMessages(false);
  } catch (err) {
    console.error('إرسال الرسالة:', err.message);
    allMessages = allMessages.filter(m => m.id !== optimisticMsg.id);
    renderChat();
    messageInput.value = tempText;
  } finally {
    messageInput.disabled = false;
    sendBtn.disabled = false;
    messageInput.focus();
  }
});

// Init
loadMessages(true);
refreshInterval = setInterval(() => loadMessages(false), 5000);

// Cleanup
window.addEventListener('beforeunload', () => clearInterval(refreshInterval));
</script>
</body>
</html>
