<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teacher Dashboard Pro - Dark</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>*{font-family:'Cairo',sans-serif}body{background:#020617;color:#e2e8f0}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#4c1d95;border-radius:3px}.msg{animation:in.2s ease-out}@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}</style>
</head>
<body class="h-screen overflow-hidden">
<header class="h-[68px] bg-[#0f172a] border-b border-violet-900/20 fixed inset-x-0 top-0 z-40">
  <div class="h-full px-5 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-violet-600 to-purple-600 grid place-items-center font-bold text-white">ع</div>
      <div><div class="font-bold text-white">لوحة الأستاذ عبدالحميد</div><div class="text-xs text-emerald-400 flex items-center gap-1"><span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>متصل</div></div>
    </div>
    <div id="clock" class="font-mono text-violet-300 bg-[#020617] px-3 py-1.5 rounded-lg border border-violet-900/30 text-sm">--:-- --</div>
  </div>
</header>

<main class="pt-[68px] h-screen flex">
<aside class="w-full lg:w-[360px] bg-[#0f172a] border-l border-violet-900/20 flex flex-col h-[calc(100vh-68px)]">
  <div class="p-3 border-b border-white/5"><input id="search" placeholder="بحث..." class="w-full h-10 bg-[#020617] border border-white/10 rounded-xl px-3 text-sm outline-none focus:ring-2 focus:ring-violet-600/30"></div>
  <div id="list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
</aside>

<section id="chat" class="flex-1 hidden lg:flex flex-col bg-[#020617] h-[calc(100vh-68px)]">
  <div id="empty" class="flex-1 grid place-items-center text-gray-500">اختر طالباً</div>

  <div id="head" class="hidden bg-[#0f172a] border-b border-violet-900/20 p-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button id="back" class="lg:hidden p-2 hover:bg-white/5 rounded-lg">‹</button>
      <div class="relative"><div id="av" class="w-10 h-10 rounded-xl bg-violet-600 grid place-items-center font-bold text-white"></div><span id="dot" class="absolute -bottom-1 -left-1 w-3 h-3 bg-gray-600 rounded-full border-2 border-[#0f172a]"></span></div>
      <div><div id="nm" class="font-bold text-white"></div><div id="st" class="text-xs text-gray-400"></div></div>
    </div>
    <button id="delChat" class="text-xs bg-red-900/30 hover:bg-red-900/50 text-red-400 px-3 py-1.5 rounded-lg border border-red-800/40">مسح المحادثة</button>
  </div>

  <div id="msgsWrap" class="hidden flex-1 overflow-y-auto p-4"><div id="msgs" class="space-y-2 max-w-3xl mx-auto"></div></div>

  <div id="inpWrap" class="hidden bg-[#0f172a] border-t border-violet-900/20 p-3">
    <form id="form" class="flex gap-2 max-w-3xl mx-auto">
      <textarea id="inp" rows="1" placeholder="اكتب... Enter للإرسال" class="flex-1 bg-[#020617] border border-white/10 rounded-xl px-3 py-2.5 text-[15px] resize-none outline-none focus:ring-2 focus:ring-violet-600/30 max-h-32"></textarea>
      <button id="send" class="px-5 bg-violet-600 hover:bg-violet-700 rounded-xl font-bold disabled:opacity-40" disabled>إرسال</button>
    </form>
  </div>
</section>
</main>

<script>
const supa=window.supabase.createClient('https://igedjuwdwyoydiyhsfyb.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZWRqdXdkd3lveWRpeWhzZnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTM0OTIsImV4cCI6MjA5MzQyOTQ5Mn0.8otVjvVT5NWx6whBvA_15ke48p6N9fUWMQE7MTnCrYg');
const T='teacher_abdulhamid'; let students={}, active=null, presence={};

setInterval(()=>clock.textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}),1000);

const ch=id=>`chat:${[T,id].sort().join(':')}`;
const esc=s=>s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const time=t=>new Date(t).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});

// heartbeat للأونلاين
async function beat(){await supa.from('user_presence').upsert({user_id:T,is_online:true,last_seen:new Date().toISOString()},{onConflict:'user_id'})}
setInterval(beat,10000); beat();

async function load(){
  const {data:p}=await supa.from('user_presence').select('*'); presence={}; (p||[]).forEach(x=>presence[x.user_id]=x);
  const {data:m}=await supa.from('messages').select('*').ilike('channel',`%${T}%`).order('created_at',{ascending:false}).limit(1000);
  const map={}; (m||[]).forEach(msg=>{if(!map[msg.channel]){const s=msg.channel.split(':').find(x=>x.startsWith('student_')); if(s) map[msg.channel]={id:s,name:s.replace('student_',''),ch:msg.channel,last:msg.text,time:msg.created_at}}});
  students=Object.values(map).reduce((a,x)=>(a[x.id]=x,a),{}); render();
}
function render(f=''){
  list.innerHTML=''; Object.values(students).sort((a,b)=>new Date(b.time)-new Date(a.time)).filter(s=>!f||s.name.includes(f)).forEach(s=>{
    const on=presence[s.id]?.is_online && Date.now()-new Date(presence[s.id].last_seen)<15000;
    const d=document.createElement('button'); d.className='w-full text-right p-2.5 rounded-xl hover:bg-white/5 flex gap-3 items-center '+(active===s.id?'bg-white/5':'');
    d.innerHTML=`<div class="relative"><div class="w-11 h-11 rounded-lg bg-violet-700 grid place-items-center font-bold">${s.name[0]}</div><span class="absolute -bottom-1 -left-1 w-2.5 h-2.5 ${on?'bg-emerald-500':'bg-gray-600'} rounded-full border-2 border-[#0f172a]"></span></div><div class="flex-1 min-w-0"><div class="flex justify-between"><b class="truncate">${s.name}</b><span class="text-[11px] text-gray-500">${time(s.time)}</span></div><div class="text-xs text-gray-400 truncate">${esc(s.last||'')}</div></div>`;
    d.onclick=()=>open(s.id); list.appendChild(d);
  });
}
async function open(id){
  active=id; empty.classList.add('hidden'); head.classList.remove('hidden'); msgsWrap.classList.remove('hidden'); inpWrap.classList.remove('hidden'); chat.classList.remove('hidden'); chat.classList.add('flex');
  nm.textContent=students[id].name; av.textContent=students[id].name[0]; updateStatus();
  const {data}=await supa.from('messages').select('*').eq('channel',ch(id)).order('created_at'); msgs.innerHTML=''; (data||[]).forEach(add);
  msgsWrap.scrollTop=msgsWrap.scrollHeight; await supa.from('messages').update({status:'read',read_at:new Date().toISOString()}).eq('channel',ch(id)).neq('from_id',T); inp.focus();
}
function updateStatus(){const p=presence[active]; const on=p?.is_online && Date.now()-new Date(p.last_seen)<15000; dot.className=`absolute -bottom-1 -left-1 w-3 h-3 ${on?'bg-emerald-500':'bg-gray-600'} rounded-full border-2 border-[#0f172a]`; st.textContent=on?'Online now':'Last seen '+time(p?.last_seen||Date.now());}

function add(m){
  const me=m.from_id===T; const w=document.createElement('div'); w.className='msg flex '+(me?'justify-end':'justify-start')+' group relative';
  let tick=''; if(me) tick=m.status==='read'?'<span class="text-sky-400">✓✓</span>':m.status==='delivered'?'<span class="text-gray-400">✓✓</span>':'<span class="text-gray-500">✓</span>';
  w.innerHTML=`<div class="max-w-[75%] relative"><div class="${me?'bg-violet-600 text-white':'bg-[#1e293b]'} px-3.5 py-2 rounded-2xl ${me?'rounded-bl-md':'rounded-br-md'}">${esc(m.text)}</div><div class="text-[10px] text-gray-500 mt-1 flex gap-1 ${me?'justify-end':'justify-start'}">${time(m.created_at)} ${tick}</div><button onclick="delMsg('${m.id}')" class="absolute ${me?'-left-7':'-right-7'} top-1 opacity-0 group-hover:opacity-100 p-1.5 bg-red-900/80 hover:bg-red-800 rounded-lg transition" title="حذف"><svg class="w-3.5 h-3.5 text-red-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div>`;
  msgs.appendChild(w);
}
async function delMsg(id){ if(!confirm('حذف الرسالة؟'))return; await supa.from('messages').delete().eq('id',id); }

async function send(e){e.preventDefault(); const v=inp.value.trim(); if(!v||!active) return; inp.value=''; send.disabled=true;
  const {data}=await supa.from('messages').insert({channel:ch(active),from_id:T,text:v,status:'sent'}).select().single();
  if(data){add(data); msgsWrap.scrollTop=msgsWrap.scrollHeight; students[active].last=v; students[active].time=data.created_at; render(search.value);}
  send.disabled=false;
}
form.onsubmit=send;
inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(e)}};
inp.oninput=()=>send.disabled=!inp.value.trim();
search.oninput=e=>render(e.target.value);
back.onclick=()=>{chat.classList.add('hidden');active=null};
delChat.onclick=async()=>{if(!active||!confirm('مسح كل الرسائل للطرفين؟'))return; await supa.from('messages').delete().eq('channel',ch(active)); msgs.innerHTML=''; load();};

// realtime
supa.channel('all').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},p=>{
  const m=p.new; if(!m.channel.includes(T))return; const sid=m.channel.split(':').find(x=>x.startsWith('student_')); if(!students[sid])load(); else {students[sid].last=m.text; students[sid].time=m.created_at; render(search.value);}
  if(sid===active){add(m); msgsWrap.scrollTop=msgsWrap.scrollHeight; if(m.from_id!==T) supa.from('messages').update({status:'delivered',delivered_at:new Date().toISOString()}).eq('id',m.id);}
}).on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},p=>{if(p.new.channel===ch(active)) {const idx=[...msgs.children].findIndex(x=>x.textContent.includes(p.new.text.slice(0,10))); if(idx>-1) load();}}).on('postgres_changes',{event:'DELETE',schema:'public',table:'messages'},p=>{if(active) open(active)}).on('postgres_changes',{event:'*',schema:'public',table:'user_presence'},load).subscribe();

load();
</script>
</body>
</html>
