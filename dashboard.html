<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم الأستاذ عبدالحميد</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{font-family:'Cairo',sans-serif}
body{background:#020617;color:#e2e8f0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#4c1d95;border-radius:3px}
.msg-enter{animation:slide.25s ease}@keyframes slide{from{opacity:0;transform:translateY(8px)}}
</style>
</head>
<body class="h-screen overflow-hidden">
<!-- Header -->
<header class="h-[70px] bg-[#0f172a]/95 backdrop-blur border-b border-slate-800 fixed top-0 inset-x-0 z-40">
  <div class="h-full max-w-[1600px] mx-auto px-5 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-violet-600 to-purple-600 grid place-items-center shadow-lg">
        <span class="text-white font-black text-xl">ع</span>
      </div>
      <div>
        <h1 class="font-bold text-[17px]">لوحة تحكم الأستاذ عبدالحميد</h1>
        <div class="flex items-center gap-1.5 mt-0.5">
          <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
          <span class="text-[11px] text-emerald-400">النظام يعمل</span>
        </div>
      </div>
    </div>
    <div id="clock" class="font-mono text-violet-300 text-sm"></div>
  </div>
</header>

<main class="pt-[70px] h-screen flex">
  <!-- Sidebar -->
  <aside class="w-[380px] bg-[#0f172a] border-l border-slate-800 flex flex-col h-[calc(100vh-70px)]">
    <div class="p-4">
      <input id="search" placeholder="ابحث عن طالب..." class="w-full h-11 bg-[#020617] border border-slate-800 rounded-xl px-4 outline-none focus:border-violet-600 transition">
    </div>
    <div id="students" class="flex-1 overflow-y-auto px-3 pb-3 space-y-1"></div>
  </aside>

  <!-- Chat -->
  <section class="flex-1 flex flex-col bg-[#020617]">
    <div id="empty" class="flex-1 grid place-items-center text-zinc-600">
      <div class="text-center">
        <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-violet-950/50 grid place-items-center">
          <svg class="w-10 h-10 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        </div>
        <p>اختر محادثة من القائمة</p>
      </div>
    </div>

    <div id="chatHead" class="hidden h-[64px] bg-[#0f172a] border-b border-slate-800 px-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div id="avatar" class="w-10 h-10 rounded-xl bg-violet-600 grid place-items-center font-bold"></div>
        <div>
          <div id="studentName" class="font-bold"></div>
          <div id="studentStatus" class="text-xs text-zinc-500">متصل</div>
        </div>
      <button id="clearBtn" class="text-xs px-3 py-1.5 bg-red-950/50 hover:bg-red-900/70 text-red-300 rounded-lg border border-red-900/50 transition">مسح المحادثة</button>
    </div>

    <div id="msgsWrap" class="hidden flex-1 overflow-y-auto">
      <div id="msgs" class="max-w-4xl mx-auto p-5 space-y-3"></div>
    </div>

    <div id="inputWrap" class="hidden p-4 bg-[#0f172a] border-t border-slate-800">
      <form id="form" class="max-w-4xl mx-auto flex gap-2">
        <textarea id="input" rows="1" placeholder="اكتب رسالتك... Enter للإرسال" class="flex-1 bg-[#020617] border border-slate-800 rounded-xl px-4 py-2.5 resize-none outline-none focus:border-violet-600 max-h-32"></textarea>
        <button class="px-6 bg-violet-600 hover:bg-violet-500 disabled:opacity-40 rounded-xl font-bold transition" disabled>إرسال</button>
      </form>
    </div>
  </section>
</main>

<!-- استبدل كل الـ <script type="module"> في dashboard.html بهذا -->
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const supa = createClient('https://igedjuwdwyoydiyhsfyb.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZWRqdXdkd3lveWRpeWhzZnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTM0OTIsImV4cCI6MjA5MzQyOTQ5Mn0.8otVjvVT5NWx6whBvA_15ke48p6N9fUWMQE7MTnCrYg');
const ME = 'teacher_abdulhamid';
let active = null;

console.log('🔧 Teacher Dashboard Loading...');

// 1- HEARTBEAT
setInterval(async ()=> {
  await supa.from('user_presence').upsert({user_id:ME, is_online:true, last_seen:new Date().toISOString()});
}, 3000);

// 2- تحميل الطلاب - نسخة مضمونة
async function loadStudents(){
  console.log('📥 Loading students...');
  // جيب كل الرسائل بدون فلتر معقد
  const { data, error } = await supa.from('messages').select('*').order('created_at',{ascending:false}).limit(500);
  
  if(error){ console.error('❌ DB Error:', error); return; }
  console.log('✅ Found', data?.length, 'messages');
  
  const map = new Map();
  data?.forEach(m=>{
    // دور على أي قناة فيها teacher
    if(m.channel && m.channel.includes('teacher')){
      const parts = m.channel.split(':');
      const sid = parts.find(p => p.startsWith('student_'));
      if(sid && !map.has(sid)){
        map.set(sid, {
          id: sid,
          name: sid.replace('student_',''),
          last: m.text?.substring(0,30) || '',
          time: m.created_at,
          channel: m.channel
        });
        console.log('👤 Found student:', sid);
      }
    }
  });
  
  const studentsDiv = document.getElementById('students');
  studentsDiv.innerHTML = '';
  
  if(map.size === 0){
    studentsDiv.innerHTML = '<div class="p-4 text-center text-zinc-500 text-sm">لا يوجد طلاب بعد<br><span class="text-xs">اطلب من طالب يبعت رسالة</span></div>';
    return;
  }
  
  [...map.values()].forEach(s=>{
    const btn = document.createElement('button');
    btn.className = 'w-full p-3 rounded-xl hover:bg-white/5 flex items-center gap-3 text-right';
    btn.innerHTML = `<div class="w-10 h-10 rounded-lg bg-violet-700 grid place-items-center">${s.name[0]}</div><div class="flex-1 min-w-0"><div class="text-sm truncate">${s.name}</div><div class="text-xs text-zinc-500 truncate">${s.last}</div></div>`;
    btn.onclick = ()=> openChat(s);
    studentsDiv.appendChild(btn);
  });
}

// 3- فتح محادثة
async function openChat(student){
  console.log('💬 Opening chat with:', student.id);
  active = student.id;
  document.getElementById('empty').classList.add('hidden');
  document.getElementById('chatHead').classList.remove('hidden');
  document.getElementById('msgsWrap').classList.remove('hidden');
  document.getElementById('inputWrap').classList.remove('hidden');
  document.getElementById('studentName').textContent = student.name;
  document.getElementById('avatar').textContent = student.name[0];
  
  const channel = student.channel || `chat:${[ME, student.id].sort().join(':')}`;
  console.log('📡 Channel:', channel);
  
  const { data, error } = await supa.from('messages').select('*').eq('channel', channel).order('created_at');
  
  if(error){ console.error('❌ Load messages error:', error); }
  console.log('📨 Loaded', data?.length, 'messages');
  
  const msgs = document.getElementById('msgs');
  msgs.innerHTML = '';
  data?.forEach(m => addMsg(m));
}

// 4- إضافة رسالة
function addMsg(m){
  const me = m.from_id === ME;
  const div = document.createElement('div');
  div.className = 'flex '+(me?'justify-end':'justify-start')+' mb-2 group';
  div.dataset.id = m.id;
  div.innerHTML = `<div class="relative max-w-[75%]"><div class="${me?'bg-violet-600':'bg-slate-800'} px-3 py-2 rounded-xl text-sm">${m.text}</div><div class="text-[10px] text-zinc-500 mt-1">${new Date(m.created_at).toLocaleTimeString('ar-EG')}</div></div>`;
  document.getElementById('msgs').appendChild(div);
  document.getElementById('msgsWrap').scrollTop = 999999;
}

// 5- إرسال
document.getElementById('form').onsubmit = async e => {
  e.preventDefault();
  const input = document.getElementById('input');
  const txt = input.value.trim();
  if(!txt || !active) return;
  
  input.value = '';
  const channel = `chat:${[ME, active].sort().join(':')}`;
  
  // ارسم فوراً
  addMsg({id:'tmp', from_id:ME, text:txt, created_at:new Date().toISOString()});
  
  await supa.from('messages').insert({channel, from_id:ME, text:txt, status:'sent'});
  document.querySelector('[data-id="tmp"]')?.remove();
  loadStudents();
};

// Realtime - مهم جداً
supa.channel('all-messages')
  .on('postgres_changes', {event:'*', schema:'public', table:'messages'}, payload => {
    console.log('🔔 Realtime:', payload.eventType, payload.new?.channel);
    loadStudents();
    if(active && payload.new?.channel?.includes(active)){
      if(payload.eventType === 'INSERT') addMsg(payload.new);
    }
  })
  .subscribe();

console.log('✅ Dashboard ready');
loadStudents();
setInterval(loadStudents, 5000); // إعادة تحميل كل 5 ثواني كـ backup
</script>
</body>
</html>
