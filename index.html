<!-- WhatsApp + Chat Widget -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<div id="elkhen-widget-root"></div>

<script>
(function(){
  // انتظر لحد ما كل حاجة تحمل
  window.addEventListener('load', function(){
    
    // امسح أي زر قديم
    document.querySelectorAll('.wa-float, .chat-float, #chatPopup').forEach(el => el.remove());
    
    const html = `
      <a href="https://wa.me/96555959295" target="_blank" id="waBtn" style="position:fixed;bottom:20px;left:20px;z-index:99999;text-decoration:none">
        <div style="width:56px;height:56px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(37,211,102,.4);cursor:pointer;transition:.2s">
          <i class="fab fa-whatsapp" style="color:#fff;font-size:28px"></i>
        </div>
      </a>
      
      <button id="chatBtn" style="position:fixed;bottom:20px;left:88px;z-index:99999;background:none;border:none;padding:0;cursor:pointer">
        <div style="width:56px;height:56px;background:linear-gradient(135deg,#8b5cf6,#ec4899);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(139,92,246,.4);transition:.2s">
          <i class="fas fa-comments" style="color:#fff;font-size:22px"></i>
        </div>
      </button>
      
      <div id="chatPopupElkhen" style="position:fixed;bottom:90px;left:20px;width:370px;max-width:calc(100vw - 40px);height:540px;background:#0a0f1c;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.7);z-index:100000;display:none;flex-direction:column;overflow:hidden;border:1px solid rgba(139,92,246,.3)">
        <div style="height:48px;background:linear-gradient(90deg,#7c3aed,#8b5cf6);display:flex;align-items:center;justify-content:space-between;padding:0 15px;color:#fff;font-family:'Cairo',sans-serif;font-weight:700">
          <span>💬 دردشة مباشرة</span>
          <button id="closeChatElkhen" style="background:rgba(0,0,0,.2);border:none;color:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:20px;line-height:1">×</button>
        </div>
        <iframe id="chatIframeElkhen" style="flex:1;border:0;width:100%;background:#020617" src="about:blank"></iframe>
      </div>
    `;
    
    document.body.insertAdjacentHTML('beforeend', html);
    
    const chatBtn = document.getElementById('chatBtn');
    const popup = document.getElementById('chatPopupElkhen');
    const closeBtn = document.getElementById('closeChatElkhen');
    const iframe = document.getElementById('chatIframeElkhen');
    let loaded = false;
    
    chatBtn.onclick = function(){
      const isOpen = popup.style.display === 'flex';
      popup.style.display = isOpen ? 'none' : 'flex';
      
      if(!isOpen && !loaded){
        iframe.src = '/chat.html';
        loaded = true;
      }
    };
    
    closeBtn.onclick = () => popup.style.display = 'none';
    
    // hover effect
    [document.getElementById('waBtn').firstElementChild, chatBtn.firstElementChild].forEach(el=>{
      el.onmouseenter = () => el.style.transform = 'translateY(-2px) scale(1.05)';
      el.onmouseleave = () => el.style.transform = 'none';
    });
    
    console.log('✅ Elkhen chat widget loaded');
  });
})();
</script>

</body>
