<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>دردشة مباشرة مع أستاذ عبدالحميد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { font-family: 'Cairo', sans-serif; margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
:root {
    --accent: #8b5cf6; --accent-2: #ec4899; --accent-secondary: #7c3aed;
    --bg-1: #030712; --bg-2: #0b1220; --bg-3: #111827;
    --card: rgba(17,24,39,0.7); --border: rgba(139,92,246,0.18);
    --text-1: #f8fafc; --text-2: #cbd5e1; --text-3: #94a3b8;
    --success: #22c55e; --shadow: 0 20px 60px rgba(0,0,0,0.45);
}
html,body { height:100%; }
body {
    background: var(--bg-1);
    color: var(--text-1);
    min-height:100vh; display:flex; flex-direction:column;
    overflow-x:hidden; position:relative;
}
body::before, body::after {
    content:''; position:fixed; inset:auto; z-index:0; pointer-events:none;
    width:500px; height:500px; border-radius:50%; filter:blur(120px); opacity:.25;
}
body::before { top:-150px; right:-150px; background: radial-gradient(circle, var(--accent), transparent 60%); animation: float 18s ease-in-out infinite; }
body::after { bottom:-200px; left:-150px; background: radial-gradient(circle, var(--accent-2), transparent 60%); animation: float 22s ease-in-out infinite reverse; }
@keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-30px)} }

header {
    position:sticky; top:0; z-index:50;
    padding:14px 18px; background: rgba(3,7,18,0.7); backdrop-filter: blur(20px) saturate(160%);
    border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:12px;
}
.logo { display:flex; align-items:center; gap:10px; font-weight:900; font-size:1.25rem; }
.logo-icon { width:38px; height:38px; display:grid; place-items:center; border-radius:12px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow:0 8px 20px rgba(139,92,246,.35); }
.logo span { background:linear-gradient(135deg,#fff,var(--accent)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.header-actions { display:flex; gap:8px; }
.icon-btn, .back-btn {
    display:inline-flex; align-items:center; gap:8px; padding:9px 14px; border-radius:12px;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
    color:var(--text-2); text-decoration:none; font-weight:700; font-size:13px; cursor:pointer; transition:.2s;
}
.icon-btn:hover, .back-btn:hover { background:rgba(139,92,246,.15); border-color:var(--accent); color:white; transform:translateY(-1px); }
.back-btn { color:var(--accent); border-color:rgba(139,92,246,.35); }

main { flex:1; padding:20px; max-width:980px; margin:0 auto; width:100%; position:relative; z-index:1; display:grid; grid-template-columns:1fr; gap:18px; }
@media(min-width:900px){ main{ grid-template-columns:320px 1fr; align-items:start; } }

.sidebar { display:none; }
@media(min-width:900px){
    .sidebar{ display:block; position:sticky; top:84px; }
}
.card {
    background:var(--card); backdrop-filter: blur(24px) saturate(140%);
    border:1px solid rgba(255,255,255,0.06); border-radius:24px; overflow:hidden; box-shadow:var(--shadow);
}
.s-card { padding:20px; }
.teacher-profile { text-align:center; }
.teacher-avatar { width:84px; height:84px; margin:0 auto 12px; border-radius:22px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:grid; place-items:center; box-shadow:0 12px 30px rgba(139,92,246,.35); position:relative; }
.teacher-avatar i { font-size:36px; color:white; }
.teacher-avatar::after { content:''; position:absolute; bottom:4px; left:4px; width:16px; height:16px; background:var(--success); border:3px solid var(--bg-3); border-radius:50%; }
.teacher-profile h3 { font-weight:900; font-size:1.15rem; margin-bottom:4px; }
.teacher-profile p { color:var(--text-3); font-size:13px; }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
.stat { background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.06); border-radius:14px; padding:12px; text-align:center; }
.stat b { display:block; font-size:1.1rem; color:var(--accent); }
.stat span { font-size:11px; color:var(--text-3); }

.chat-wrap { display:flex; flex-direction:column; height:min(78vh, calc(100dvh - 140px)); }
.chat-head { padding:16px 18px; border-bottom:1px solid rgba(255,255,255,.06); display:flex; align-items:center; gap:12px; background:linear-gradient(180deg,rgba(255,255,255,.03),transparent); }
.ch-avatar { width:46px; height:46px; border-radius:14px; background:linear-gradient(135deg,var(--accent),var(--accent-secondary)); display:grid; place-items:center; flex-shrink:0; }
.ch-avatar i { color:white; font-size:18px; }
.ch-info h2 { font-size:1.05rem; font-weight:800; line-height:1.2; }
.ch-meta { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-3); }
.live { display:flex; align-items:center; gap:6px; color:#4ade80; }
.live-dot { width:8px; height:8px; background:#4ade80; border-radius:50%; animation:pulse 1.6s infinite; box-shadow:0 0 10px #4ade80; }
@keyframes pulse{0%,100%{opacity:1; transform:scale(1)}50%{opacity:.6; transform:scale(.85)}}
.mode-badge { font-size:10px; padding:3px 8px; border-radius:999px; background:rgba(139,92,246,.15); border:1px solid var(--border); color:var(--accent); }

#chat {
    flex:1; overflow-y:auto; overflow-x:hidden; padding:20px 16px;
    display:flex; flex-direction:column; gap:14px; scroll-behavior:smooth;
    background: radial-gradient(800px 400px at 100% -10%, rgba(139,92,246,.08), transparent),
                radial-gradient(600px 300px at 0% 110%, rgba(236,72,153,.06), transparent);
}
#chat::-webkit-scrollbar{ width:6px; } #chat::-webkit-scrollbar-thumb{ background:rgba(139,92,246,.4); border-radius:3px; }

.msg-wrap { display:flex; gap:8px; align-items:flex-end; max-width:86%; animation:msgIn .35s cubic-bezier(.2,.8,.2,1); }
@keyframes msgIn{ from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:none} }
.msg-wrap.me { align-self:flex-start; flex-direction:row-reverse; }
.msg-wrap.teacher { align-self:flex-end; }
.m-avatar { width:28px; height:28px; border-radius:8px; background:rgba(255,255,255,.06); display:grid; place-items:center; font-size:12px; flex-shrink:0; }
.me .m-avatar{ background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:white; }
.msg { position:relative; padding:12px 14px 20px; border-radius:18px; line-height:1.7; font-size:14.5px; box-shadow:0 4px 16px rgba(0,0,0,.2); }
.me .msg { background:linear-gradient(135deg,var(--accent),var(--accent-secondary)); color:white; border-bottom-right-radius:6px; }
.teacher .msg { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.09); border-bottom-left-radius:6px; }
.msg-time { position:absolute; bottom:4px; left:12px; font-size:10px; opacity:.75; display:flex; align-items:center; gap:4px; }
.me .msg-time { left:auto; right:12px; }
.tick { color:#a5f3fc; }

.quick { display:flex; gap:8px; padding:0 14px 10px; overflow-x:auto; scrollbar-width:none; }
.quick::-webkit-scrollbar{ display:none; }
.q { flex-shrink:0; padding:8px 12px; border-radius:999px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); font-size:12.5px; cursor:pointer; transition:.2s; white-space:nowrap; }
.q:hover{ background:rgba(139,92,246,.2); border-color:var(--accent); transform:translateY(-1px); }

.typing { display:none; align-self:flex-end; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); padding:10px 14px; border-radius:16px; gap:4px; }
.typing.show{ display:flex; }
.typing span{ width:6px; height:6px; background:var(--text-3); border-radius:50%; animation:b 1.2s infinite; }
.typing span:nth-child(2){ animation-delay:.2s } .typing span:nth-child(3){ animation-delay:.4s }
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

.chat-input-wrap { padding:12px; border-top:1px solid rgba(255,255,255,.06); background:rgba(0,0,0,.2); }
.input-row { display:flex; align-items:flex-end; gap:8px; background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.09); border-radius:16px; padding:8px; transition:.2s; }
.input-row:focus-within{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(139,92,246,.18); }
.chat-input-wrap .tool { width:38px; height:38px; display:grid; place-items:center; background:transparent; border:none; color:var(--text-3); cursor:pointer; border-radius:10px; transition:.2s; flex-shrink:0; }
.chat-input-wrap .tool:hover{ color:var(--accent); background:rgba(139,92,246,.12); }
#msgInput { flex:1; background:transparent; border:none; outline:none; color:white; font-size:15px; padding:8px 4px; resize:none; max-height:120px; min-height:24px; line-height:1.5; }
#sendBtn { width:42px; height:42px; border:none; border-radius:12px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:white; cursor:pointer; display:grid; place-items:center; transition:.2s; box-shadow:0 6px 16px rgba(139,92,246,.35); flex-shrink:0; }
#sendBtn:hover{ transform:translateY(-1px) scale(1.03); }
#sendBtn:active{ transform:scale(.96); }
#sendBtn:disabled{ opacity:.5; cursor:not-allowed; }

.empty { text-align:center; padding:50px 20px; color:var(--text-3); margin:auto; }
.empty i { font-size:52px; margin-bottom:14px; display:block; background:linear-gradient(135deg,var(--accent),var(--accent-2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; opacity:.8; }
.empty h3 { color:var(--text-1); margin-bottom:6px; font-weight:800; }

@media(max-width:600px){
    main{ padding:12px; } .chat-wrap{ height:calc(100dvh - 92px); border-radius:20px; } header{ padding:12px 14px; } .logo{ font-size:1.1rem; }
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon"><i class="fa-solid fa-flask-vial"></i></div>
    <span>الكيمياء</span>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="callBtn" title="اتصال"><i class="fa-solid fa-phone"></i></button>
    <a href="#" class="back-btn"><i class="fa-solid fa-arrow-right"></i> رجوع</a>
  </div>
</header>

<main>
  <aside class="sidebar">
    <div class="card s-card">
      <div class="teacher-profile">
        <div class="teacher-avatar"><i class="fa-solid fa-chalkboard-teacher"></i></div>
        <h3>أ. عبدالحميد الخن</h3>
        <p>مدرس كيمياء • خبرة 16 سنة</p>
        <div class="stats">
          <div class="stat"><b>4.9</b><span>التقييم</span></div>
          <div class="stat"><b>~2د</b><span>سرعة الرد</span></div>
        </div>
      </div>
    </div>
  </aside>

  <section class="card chat-wrap">
    <div class="chat-head">
      <div class="ch-avatar"><i class="fa-solid fa-chalkboard-teacher"></i></div>
      <div class="ch-info" style="flex:1">
        <h2 id="teacherName">أ. عبدالحميد الخن</h2>
        <div class="ch-meta">
          <span class="live"><span class="live-dot"></span> متصل الآن</span>
          <span>•</span>
          <span id="modeBadge" class="mode-badge">آمن ومشفر</span>
        </div>
      </div>
    </div>
    
    <div id="chat">
      <div class="empty" id="emptyState">
        <i class="fa-regular fa-comments"></i>
        <h3>مرحباً بك في الدردشة المباشرة</h3>
        <p>اسأل المعلم عن أي شيء في الكيمياء وسيرد عليك مباشرة</p>
      </div>
      <div class="typing" id="typing"><span></span><span></span><span></span></div>
    </div>

    <div class="chat-input-wrap">
      <div class="input-row">
        <button class="tool" id="emojiBtn" title="إيموجي"><i class="fa-regular fa-face-smile"></i></button>
        <textarea id="msgInput" placeholder="اكتب سؤالك هنا..." rows="1"></textarea>
        <button class="tool" id="attachBtn" title="إرفاق"><i class="fa-solid fa-paperclip"></i></button>
        <button id="sendBtn" disabled><i class="fa-solid fa-paper-plane"></i></button>
      </div>
    </div>
  </section>
</main>

<script>
(async function() {
const SUPABASE_URL = 'https://igedjuwdwyoydiyhsfyb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZWRqdXdkd3lveWRpeWhzZnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTM0OTIsImV4cCI6MjA5MzQyOTQ5Mn0.8otVjvVT5NWx6whBvA_15ke48p6N9fUWMQE7MTnCrYg';
let supabase = null;
try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e){}

const chatBox = document.getElementById('chat');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const typingEl = document.getElementById('typing');
const emptyState = document.getElementById('emptyState');
const modeBadge = document.getElementById('modeBadge');

let studentName = localStorage.getItem('chem11_student') || '';
if(!studentName){
  studentName = prompt('اكتب اسمك الأول:') || 'طالب';
  localStorage.setItem('chem11_student', studentName);
}
const userId = 'student_' + studentName.replace(/\s+/g,'_').substring(0,20);
const teacherId = 'teacher_abdulhamid';
const channelName = `chat:${[userId, teacherId].sort().join(':')}`;
const storageKey = `chem11_chat_${channelName}`;

let useSupabase = false;
if(supabase){
  try{
    const { error } = await supabase.from('messages').select('id').limit(1);
    useSupabase = !error;
  }catch(e){ useSupabase = false; }
}
modeBadge.textContent = useSupabase ? 'متصل مباشر' : 'وضع تجريبي';
modeBadge.style.background = useSupabase ? 'rgba(34,197,94,.15)' : 'rgba(139,92,246,.15)';
modeBadge.style.borderColor = useSupabase ? 'rgba(34,197,94,.3)' : 'var(--border)';
modeBadge.style.color = useSupabase ? '#4ade80' : 'var(--accent)';

function fmtTime(d){ return new Date(d).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}); }
function escapeHtml(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function addMessage(text, from, time, opts={}) {
  if(emptyState) emptyState.style.display='none';
  const isMe = from === userId;
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + (isMe ? 'me' : 'teacher');
  wrap.innerHTML = `
    <div class="m-avatar">${isMe ? '<i class="fa-solid fa-user"></i>' : '<i class="fa-solid fa-chalkboard-teacher"></i>'}</div>
    <div class="msg">${escapeHtml(text).replace(/\n/g,'<br>')}
      <div class="msg-time">${fmtTime(time)} ${isMe?'<i class="fa-solid fa-check-double tick"></i>':''}</div>
    </div>`;
  chatBox.insertBefore(wrap, typingEl);
  chatBox.scrollTop = chatBox.scrollHeight;
  if(opts.save !== false) saveLocal({text,from,time});
}

function saveLocal(m){
  try{
    const arr = JSON.parse(localStorage.getItem(storageKey)||'[]');
    arr.push(m); if(arr.length>200) arr.shift();
    localStorage.setItem(storageKey, JSON.stringify(arr));
  }catch{}
}
function loadLocal(){
  try{
    const arr = JSON.parse(localStorage.getItem(storageKey)||'[]');
    arr.forEach(m=> addMessage(m.text, m.from, m.time, {save:false}));
  }catch{}
}

async function loadHistory(){
  if(useSupabase){
    try{
      const { data } = await supabase.from('messages').select('*').eq('channel', channelName).order('created_at',{ascending:true}).limit(100);
      if(data && data.length){
        chatBox.querySelectorAll('.msg-wrap').forEach(n=>n.remove());
        data.forEach(m=> addMessage(m.text, m.from_id, m.created_at, {save:false}));
        return;
      }
    }catch{}
  }
  loadLocal();
}

if(useSupabase && supabase){
  try{
    supabase.channel('public:messages:'+channelName)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`channel=eq.${channelName}`}, payload=>{
        const m = payload.new;
        if(m.from_id !== userId) addMessage(m.text, m.from_id, m.created_at, {save:false});
      }).subscribe();
  }catch{}
}

async function sendMessage(){
  const text = msgInput.value.trim();
  if(!text) return;
  const now = new Date().toISOString();
  addMessage(text, userId, now);
  msgInput.value=''; msgInput.style.height='auto'; sendBtn.disabled=true;
  
  if(useSupabase){
    try{ await supabase.from('messages').insert({channel:channelName, from_id:userId, text}); }catch{}
  }
}

sendBtn.onclick = sendMessage;
msgInput.addEventListener('input', ()=>{
  msgInput.style.height='auto'; msgInput.style.height=Math.min(msgInput.scrollHeight,120)+'px';
  sendBtn.disabled = !msgInput.value.trim();
});
msgInput.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); if(!sendBtn.disabled) sendMessage(); }});

document.getElementById('emojiBtn').onclick = ()=>{
  const emojis=['😊','👍','🙏','💡','✅','❓','🔬','🧪']; const e=emojis[Math.floor(Math.random()*emojis.length)];
  msgInput.value += e; sendBtn.disabled=false; msgInput.focus();
};
document.getElementById('attachBtn').onclick = ()=> alert('ميزة إرفاق الملفات ستتوفر قريباً');
document.getElementById('callBtn').onclick = ()=> alert('سيتم الاتصال بالأستاذ عبدالحميد الخن...');

loadHistory();

if(!localStorage.getItem(storageKey)){
  setTimeout(()=> addMessage(`أهلاً ${studentName} 👋 أنا أ. عبدالحميد. اسألني أي شيء عن الكيمياء وأنا معك خطوة بخطوة.`, teacherId, new Date().toISOString(), {save:false}), 600);
}
})();

// حضور أونلاين
setInterval(async ()=>{
  await supa.from('user_presence').upsert({user_id:userId, last_seen:new Date(), is_online:true})
},4000);

// لما توصلك رسالة من المعلم → علّمها delivered
supa.channel('deliver').on('postgres_changes',{event:'INSERT',table:'messages'},async p=>{
  if(p.new.channel.includes(userId) && p.new.from_id!==userId){
    await supa.from('messages').update({status:'delivered',delivered_at:new Date()}).eq('id',p.new.id)
  }
}).subscribe()

// لما تفتح الشات → علّم الكل مقروء
async function markAllRead(){
  await supa.from('messages').update({status:'read',read_at:new Date()}).eq('channel',channel).neq('from_id',userId)
}
const channelName = `chat:${[userId, 'teacher_abdulhamid'].sort().join(':')}`;
</script>
</body>
</html>
